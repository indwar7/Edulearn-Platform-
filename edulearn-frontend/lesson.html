<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Centralized role guard + nav access control. MUST load first (before body
     paints) so a disallowed user is redirected without seeing page content. -->
<script src="role-guard.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson — EduLearn</title>
<meta name="description" content="EduLearn lesson player. AI animated video lectures, practice, notes and tests.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Schibsted+Grotesk:ital,wght@0,400..900;1,400..900&family=Fragment+Mono:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#FFFFFF;
  --card:#FFFFFF;
  --card2:#F5F7FA;
  --line:rgba(0,0,0,.08);
  --cream:#1A1F36;
  --muted:#6B7280;
  --teal:#3DE8C5;
  --aurora:linear-gradient(115deg,#3DE8C5 0%,#7C9BFF 48%,#FFB454 100%);
  --ease:cubic-bezier(.22,1,.36,1);
  --on-accent:#0B1224;
  --navbg:rgba(255,255,255,.95);
}
html.dark-mode{
  --ink:#0F172A;
  --card:#1a2847;
  --card2:#253556;
  --line:rgba(255,255,255,.1);
  --cream:#F5F7FA;
  --muted:#CBD5E1;
  --navbg:rgba(15,23,42,.95);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--ink);
  color:var(--cream);
  font-family:'Schibsted Grotesk',sans-serif;
  font-size:16px;line-height:1.55;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  display:flex;flex-direction:column;
}
a{color:inherit;text-decoration:none}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
.mono{font-family:'Fragment Mono',monospace;text-transform:uppercase;letter-spacing:.12em;font-size:11px}

.nav{
  position:sticky;top:0;z-index:10;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  background:var(--navbg);
  border-bottom:1px solid var(--line);
}
.nav__inner{
  max-width:1600px;margin:0 auto;padding:0 40px;height:72px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.brand{display:flex;align-items:center;gap:10px}
.brand__word{font-family:'Fraunces',serif;font-weight:600;font-size:22px;letter-spacing:-.01em}
.nav__right{display:flex;align-items:center;gap:12px}
.nav .nav__theme{
  height:34px;display:inline-flex;align-items:center;justify-content:center;
  border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:15px;
  background:transparent;color:var(--cream);
  transition:border-color .3s var(--ease),background .3s var(--ease);
}
.nav .nav__theme:hover{border-color:rgba(61,232,197,.45);background:rgba(61,232,197,.08);transform:none}
.btn-back{
  display:inline-flex;align-items:center;gap:8px;
  border:1px solid var(--line);border-radius:999px;
  padding:9px 18px;font-weight:600;font-size:14px;
  transition:border-color .3s var(--ease),background .3s var(--ease);
}
.btn-back:hover{border-color:rgba(61,232,197,.45);background:rgba(61,232,197,.08)}

main{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:60px 22px;
}
.stage{
  width:100%;max-width:680px;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:28px;
  padding:48px 40px;
  text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:18px;
}
.stage__crumb{color:var(--muted)}
.stage__title{
  font-family:'Fraunces',serif;font-weight:500;
  font-size:clamp(28px,5vw,44px);line-height:1.1;letter-spacing:-.02em;
}
.stage__sub{color:var(--muted);font-size:15px;max-width:440px}
.stage__mods{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:6px}
.modchip{
  display:inline-flex;align-items:center;gap:7px;
  border:1px solid var(--line);border-radius:999px;
  background:var(--card2);
  padding:7px 14px;
  font-family:'Fragment Mono',monospace;font-size:10px;
  letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);
}
.btn-primary{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--aurora);color:var(--on-accent);
  font-weight:700;font-size:14.5px;
  padding:12px 24px;border-radius:999px;margin-top:10px;
  box-shadow:0 8px 32px rgba(61,232,197,.35);
  transition:transform .4s var(--ease),box-shadow .4s var(--ease);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 14px 44px rgba(61,232,197,.5)}

.tokky{animation:tokkyFloat 3s ease-in-out infinite alternate}
@keyframes tokkyFloat{from{transform:translateY(0)}to{transform:translateY(-7px)}}
@media (prefers-reduced-motion:reduce){.tokky{animation:none}}
@media (max-width:520px){
  .nav__inner{padding:0 14px;height:64px;gap:10px}
  .brand__word{font-size:18px}
  .btn-back span{display:none}
  .stage{padding:36px 22px}
}

/* real video playback (shown instead of the placeholder stage when a
   teacher has uploaded a lecture for this chapter) */
.vstage{width:100%;max-width:820px;display:flex;flex-direction:column;gap:16px}
.vstage__crumb{color:var(--muted)}
.vstage__title{font-family:'Fraunces',serif;font-weight:500;font-size:clamp(24px,4vw,36px);letter-spacing:-.02em}
.vplayer-wrap{width:100%;border-radius:20px;overflow:hidden;background:#000;border:1px solid var(--line)}
.vplayer-wrap video{display:block;width:100%;max-height:70vh;background:#000}
.vmeta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;color:var(--muted);font-size:13px}
.vmeta .tag{border:1px solid var(--line);border-radius:999px;padding:4px 12px;font-family:'Fragment Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase}
/* Playlist — all uploaded parts for a chapter, in order */
.vplaylist{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.vplaylist__hd{color:var(--muted);font-family:'Fragment Mono',monospace;text-transform:uppercase;letter-spacing:.1em;font-size:11px;margin-bottom:2px}
.vpitem{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid var(--line);border-radius:14px;background:var(--card);cursor:pointer;text-align:left;transition:border-color .2s,transform .2s,background .2s;width:100%}
.vpitem:hover{border-color:var(--muted);transform:translateX(3px)}
.vpitem.is-active{border-color:#3DE8C5;background:var(--card2)}
.vpitem__n{flex:none;width:26px;height:26px;border-radius:50%;background:var(--card2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:'Fragment Mono',monospace;font-size:12px}
.vpitem.is-active .vpitem__n{background:#3DE8C5;color:#04121A;border-color:transparent}
.vpitem__t{flex:1;font-size:14px;color:var(--ink)}
.vpitem__meta{flex:none;color:var(--muted);font-size:11px;font-family:'Fragment Mono',monospace}
</style>
<link rel="stylesheet" href="../theme.css">
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <linearGradient id="auroraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3DE8C5"/>
      <stop offset="48%" stop-color="#7C9BFF"/>
      <stop offset="100%" stop-color="#FFB454"/>
    </linearGradient>
  </defs>
</svg>

<nav class="nav">
  <div class="nav__inner">
    <a class="brand" href="index.html" aria-label="EduLearn home">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 1.5 L14.6 9.4 L22.5 12 L14.6 14.6 L12 22.5 L9.4 14.6 L1.5 12 L9.4 9.4 Z" fill="url(#auroraGrad)"/>
      </svg>
      <span class="brand__word">EduLearn</span>
    </a>
    <div class="nav__right">
      <a class="btn-back" id="backLink" href="learn.html">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 12 H4 M11 5 l-7 7 7 7"/></svg>
        <span>Back to Learn</span>
      </a>
    </div>
  </div>
</nav>

<main>
  <!-- Real video: shown when a teacher has uploaded a lecture that matches
       this chapter's class + subject + topic. -->
  <div class="vstage" id="videoStage" style="display:none">
    <div class="vstage__crumb mono" id="videoCrumb">Lesson</div>
    <h1 class="vstage__title" id="videoTitle">Lecture</h1>
    <div class="vplayer-wrap">
      <video id="player" controls playsinline></video>
    </div>
    <div class="vmeta">
      <span class="tag" id="videoClassTag"></span>
      <span class="tag" id="videoSubjectTag"></span>
      <span id="videoByline"></span>
    </div>
    <div class="vplaylist" id="videoPlaylist" style="display:none"></div>
  </div>

  <!-- Placeholder: shown when no video has been uploaded yet for this chapter. -->
  <div class="stage" id="placeholderStage">
    <svg class="tokky" width="96" height="96" viewBox="0 0 100 100" aria-hidden="true">
      <circle cx="50" cy="9" r="4" fill="#3DE8C5"/>
      <line x1="50" y1="21" x2="50" y2="12" stroke="#7C9BFF" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="50" cy="56" r="34" fill="#121C30" stroke="url(#auroraGrad)" stroke-width="2.5"/>
      <rect x="36" y="44" width="8" height="14" rx="4" fill="#F2EDE3"/>
      <rect x="56" y="44" width="8" height="14" rx="4" fill="#F2EDE3"/>
      <path d="M42 67 q8 7 16 0" fill="none" stroke="#F2EDE3" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <div class="stage__crumb mono" id="lessonCrumb">Lesson</div>
    <h1 class="stage__title" id="lessonTitle">This lesson</h1>
    <p class="stage__sub" id="placeholderSub">No video lecture has been uploaded for this chapter yet. Practice sets, notes and the mastery test land alongside it.</p>
    <div class="stage__mods" aria-hidden="true">
      <span class="modchip">Video</span>
      <span class="modchip">Practice</span>
      <span class="modchip">Notes</span>
      <span class="modchip">Book</span>
      <span class="modchip">Test</span>
    </div>
    <a class="btn-primary" id="ctaLink" href="learn.html">Browse other chapters</a>
  </div>
</main>

<script>
// Shared with the video-lookup script below (which runs after api.js loads).
var LESSON = {};
(function(){
'use strict';
var params = new URLSearchParams(window.location.search);

function titleCase(slug){
  return slug.split('-').map(function(w){
    return w ? w.charAt(0).toUpperCase() + w.slice(1) : w;
  }).join(' ');
}

var TRACKS = { yoga:'Yoga & Mindfulness', fin:'Financial Literacy', music:'Music', career:'Career Orientation' };
var SUBJECT_NAMES = { maths:'Mathematics', science:'Science', social:'Social Science', english:'English', hindi:'Hindi' };

var crumb = document.getElementById('lessonCrumb');
var title = document.getElementById('lessonTitle');
var back = document.getElementById('backLink');

var track = params.get('track');
var ch = params.get('ch');
var cls = params.get('class');
var subject = params.get('subject');
var slug = null;

/* ------------------------------------------------------------
   CLASS ACCESS CONTROL (strict): a student may only open lessons for
   their OWN class. If the URL points at any other class, bounce them
   back to their own class page. Non-students are unrestricted.
   ------------------------------------------------------------ */
(function enforceStudentClass(){
  var u = null;
  try { u = JSON.parse(localStorage.getItem('edulearn_user') || 'null'); } catch(e){}
  if (!u || u.role !== 'student') return;
  var own = (String(u.className || '').match(/\d+/) || [])[0];
  var req = (String(cls || '').match(/\d+/) || [])[0];
  if (own && req && req !== own) {
    // requested a class that isn't theirs → send to their own Learn page
    window.location.replace('learn.html');
  }
})();

if(track && TRACKS[track]){
  crumb.textContent = 'Beyond academics';
  title.textContent = TRACKS[track];
} else if(ch){
  /* ch looks like c9-sst-french-revolution → strip the c<class>-<code>- prefix */
  slug = ch.replace(/^c\d+-[a-z]+-/, '');
  title.textContent = titleCase(slug);
  var parts = [];
  if(cls) parts.push('Class ' + cls);
  if(subject && SUBJECT_NAMES[subject]) parts.push(SUBJECT_NAMES[subject]);
  crumb.textContent = parts.length ? parts.join(' · ') : 'Lesson';
}

if(cls && subject){
  back.href = 'learn.html?class=' + encodeURIComponent(cls) + '&subject=' + encodeURIComponent(subject);
  document.getElementById('ctaLink').href = back.href;
}

// Hand off to the video-lookup script (runs once EduAPI is available).
LESSON.cls = cls;
LESSON.subject = subject;
LESSON.slug = slug;
LESSON.chapterTitle = title.textContent;
LESSON.chapterCrumb = crumb.textContent;
})();
</script>
<script src="api.js"></script>
<script src="account-menu.js"></script>
<script>
(function(){
'use strict';
// Only academic chapters (not "beyond academics" tracks) have uploaded
// lecture videos — those are keyed by class/subject/topic, tracks aren't.
if (!LESSON.cls || !LESSON.subject || !LESSON.slug || !window.EduAPI) return;

var searchTerm = LESSON.slug.replace(/-/g, ' ');

EduAPI.listVideos({ className: LESSON.cls, subject: LESSON.subject, topic: searchTerm })
  .then(function(videos){
    if (!videos.length) return; // no upload yet — keep showing the placeholder

    // A chapter can have several parts. If every title carries an explicit part
    // number ("… — Part 3", "Ep 2", "4. Foo") use that; otherwise fall back to
    // upload order (oldest first), which is how the parts were uploaded.
    videos.forEach(function(v){
      var m = String(v.title || '').match(/(?:part|episode|ep)\s*(\d+)|^\s*(\d+)\s*[.)\-–—]|[-–—]\s*(\d+)\s*$/i);
      v._num = m ? parseInt(m[1] || m[2] || m[3], 10) : null;
    });
    var allNumbered = videos.every(function(v){ return v._num != null; });
    videos.sort(function(a, b){
      return allNumbered ? a._num - b._num
                         : new Date(a.createdAt) - new Date(b.createdAt);
    });
    videos.forEach(function(v, i){ v._part = allNumbered ? v._num : i + 1; });

    document.getElementById('placeholderStage').style.display = 'none';
    var stage = document.getElementById('videoStage');
    stage.style.display = 'flex';
    document.getElementById('videoCrumb').textContent = LESSON.chapterCrumb;
    document.getElementById('videoClassTag').textContent = videos[0].className;
    document.getElementById('videoSubjectTag').textContent = videos[0].subject;

    var player   = document.getElementById('player');
    var titleEl  = document.getElementById('videoTitle');
    var byline   = document.getElementById('videoByline');
    var playlist = document.getElementById('videoPlaylist');
    var viewed   = {};

    // <video src> can't send an Authorization header, and streaming is
    // eligibility-gated server-side — pass the token as a query param.
    function select(v, autoplay){
      titleEl.textContent = v.title || LESSON.chapterTitle;
      byline.textContent  = 'By ' + (v.uploadedByName || 'Teacher') + ' · ' + v.views + ' views';
      player.src = EduAPI.API_BASE + '/api/videos/' + v.id + '/stream?token=' + encodeURIComponent(EduAPI.getToken());
      player.setAttribute('data-id', v.id);
      Array.prototype.forEach.call(playlist.querySelectorAll('.vpitem'), function(el){
        el.classList.toggle('is-active', el.getAttribute('data-id') === v.id);
      });
      if (autoplay) player.play().catch(function(){});
    }

    // Count a view once per part, on first play.
    player.addEventListener('play', function(){
      var id = player.getAttribute('data-id');
      if (id && !viewed[id]) { viewed[id] = true; EduAPI.recordVideoView(id); }
    });

    // Render the part list only when there's more than one.
    if (videos.length > 1) {
      playlist.style.display = 'flex';
      playlist.innerHTML = '<div class="vplaylist__hd">' + videos.length + ' parts in this chapter</div>';
      videos.forEach(function(v){
        var b = document.createElement('button');
        b.className = 'vpitem';
        b.setAttribute('data-id', v.id);
        b.innerHTML = '<span class="vpitem__n">' + v._part + '</span>' +
                      '<span class="vpitem__t"></span>' +
                      '<span class="vpitem__meta">' + v.views + ' views</span>';
        // Badge already shows the number, so drop a leading "Part N — " prefix.
        b.querySelector('.vpitem__t').textContent =
          (v.title || ('Part ' + v._part)).replace(/^\s*part\s*\d+\s*[-–—:.]\s*/i, '');
        b.addEventListener('click', function(){ select(v, true); });
        playlist.appendChild(b);
      });
    }

    select(videos[0], false);

    // Not actually eligible for this specific video (e.g. wrong class/subject)
    // — fall back to the honest placeholder instead of a broken player.
    player.addEventListener('error', function(){
      stage.style.display = 'none';
      document.getElementById('placeholderStage').style.display = 'flex';
    });
  })
  .catch(function(){ /* lookup failed — leave the honest placeholder showing */ });
})();
</script>
<script src="../theme.js"></script>
<script src="../features-panel.js"></script>
</body>
</html>
