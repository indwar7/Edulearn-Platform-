<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — EduLearn · Start Learning Today</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Schibsted+Grotesk:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
  <style>
    :root{
      --teal:#3DE8C5;
      --peri:#7C9BFF;
      --amber:#FFB454;
      --rose:#FF7AA2;
      --aurora:linear-gradient(115deg,#3DE8C5 0%,#7C9BFF 48%,#FFB454 100%);
      --ease:cubic-bezier(.22,1,.36,1);

      /* Bold & modern dark-first palette */
      --ink:#05070F;            /* page base */
      --ink2:#0A0E1C;
      --card:rgba(17,23,41,.72); /* glass card */
      --card-solid:#111729;
      --field:rgba(255,255,255,.045);
      --field-focus:rgba(255,255,255,.07);
      --line:rgba(255,255,255,.09);
      --line-strong:rgba(255,255,255,.16);
      --text:#F4F7FF;
      --muted:#8C97B4;
      --muted-2:#5D6580;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      background:var(--ink);
      color:var(--text);
      font-family:'Schibsted Grotesk',sans-serif;
      font-size:16px;
      line-height:1.55;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
      padding:40px 20px;
    }

    /* ---------- ambient background: aurora mesh + grid + grain ---------- */
    .bg-elements{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .bg-elements::before{
      /* faint tech grid */
      content:'';position:absolute;inset:0;
      background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
                       linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
      background-size:54px 54px;
      mask-image:radial-gradient(ellipse 80% 70% at 50% 40%,#000 30%,transparent 78%);
      -webkit-mask-image:radial-gradient(ellipse 80% 70% at 50% 40%,#000 30%,transparent 78%);
    }
    .gradient-orb{
      position:absolute;border-radius:50%;filter:blur(90px);opacity:.5;
      animation:float 18s ease-in-out infinite alternate;
      will-change:transform;transform:translateZ(0);mix-blend-mode:screen;
    }
    .orb-1{width:520px;height:520px;background:radial-gradient(circle at 30% 30%,#0FBF9B,transparent 68%);top:-200px;left:-160px}
    .orb-2{width:460px;height:460px;background:radial-gradient(circle at 30% 30%,#4C6FFF,transparent 68%);bottom:-200px;right:-160px;animation-delay:4s}
    .orb-3{width:380px;height:380px;background:radial-gradient(circle at 30% 30%,#FF9A3D,transparent 70%);top:40%;right:8%;opacity:.32;animation-delay:8s}
    @keyframes float{from{transform:translate(0,0) scale(1)}to{transform:translate(46px,-38px) scale(1.12)}}

    /* ---------- the card ---------- */
    .container{
      position:relative;z-index:10;width:100%;max-width:452px;
      padding:44px 40px 34px;
      background:var(--card);
      backdrop-filter:blur(26px) saturate(1.3);
      -webkit-backdrop-filter:blur(26px) saturate(1.3);
      border:1px solid var(--line);
      border-radius:26px;
      box-shadow:0 40px 90px -20px rgba(0,0,0,.75),
                 0 2px 0 rgba(255,255,255,.04) inset,
                 0 -1px 0 rgba(0,0,0,.4) inset;
      animation:cardIn .7s var(--ease) both;
    }
    /* aurora gradient ring on the card edge */
    .container::before{
      content:'';position:absolute;inset:-1px;border-radius:27px;padding:1px;z-index:-1;
      background:linear-gradient(140deg,rgba(61,232,197,.55),rgba(124,155,255,.35) 45%,rgba(255,180,84,.45));
      -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
      -webkit-mask-composite:xor;mask-composite:exclude;
      opacity:.55;pointer-events:none;
    }
    @keyframes cardIn{from{opacity:0;transform:translateY(22px) scale(.98)}to{opacity:1;transform:none}}

    /* staggered reveal for inner blocks */
    .reveal{opacity:0;animation:rise .6s var(--ease) forwards}
    @keyframes rise{to{opacity:1;transform:none}}
    .reveal{transform:translateY(10px)}
    .d1{animation-delay:.08s}.d2{animation-delay:.16s}.d3{animation-delay:.24s}
    .d4{animation-delay:.32s}.d5{animation-delay:.4s}.d6{animation-delay:.48s}

    .logo{display:flex;align-items:center;gap:11px;margin-bottom:26px;justify-content:center}
    .logo-mark{width:38px;height:38px;filter:drop-shadow(0 4px 14px rgba(61,232,197,.35))}
    .logo-text{
      font-family:'Fraunces',serif;font-size:23px;font-weight:600;letter-spacing:-.01em;
      background:var(--aurora);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    }

    h1{
      font-family:'Fraunces',serif;font-size:37px;font-weight:600;line-height:1.05;
      margin-bottom:10px;text-align:center;letter-spacing:-.025em;color:var(--text);
    }
    .subtitle{text-align:center;color:var(--muted);margin-bottom:28px;font-size:15px}

    .form-group{margin-bottom:18px}
    label{display:block;font-size:12.5px;font-weight:600;margin-bottom:8px;color:var(--muted);letter-spacing:.01em}

    /* inputs with room for a leading icon */
    .field-wrap{position:relative}
    .field-icon{
      position:absolute;left:15px;top:50%;transform:translateY(-50%);
      color:var(--muted);pointer-events:none;transition:color .25s var(--ease);
    }
    .field-wrap:focus-within .field-icon{color:var(--teal)}

    input[type="email"],
    input[type="password"],
    input[type="text"]{
      width:100%;padding:14px 16px 14px 44px;
      border:1.5px solid var(--line);border-radius:14px;
      font-family:inherit;font-size:15px;color:var(--text);
      background:var(--field);
      transition:border-color .25s var(--ease),background .25s var(--ease),box-shadow .25s var(--ease);
    }
    input[type="email"]:focus,
    input[type="password"]:focus,
    input[type="text"]:focus{
      outline:none;border-color:rgba(61,232,197,.7);background:var(--field-focus);
      box-shadow:0 0 0 4px rgba(61,232,197,.13);
    }
    input::placeholder{color:#5D6580}

    .pw-field{position:relative}
    .pw-field input[type="password"],
    .pw-field input[type="text"]{padding-right:46px}
    .pw-toggle{
      position:absolute;right:7px;top:50%;transform:translateY(-50%);
      width:34px;height:34px;border:none;background:transparent;
      color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;
      border-radius:9px;transition:color .2s ease,background .2s ease;
    }
    .pw-toggle:hover{color:var(--text);background:rgba(255,255,255,.05)}
    .pw-toggle svg{display:block}
    .pw-toggle .eye-off{display:none}
    .pw-toggle.is-shown .eye{display:none}
    .pw-toggle.is-shown .eye-off{display:block}

    .forgot-password{text-align:right;margin:-4px 0 22px}
    .forgot-password a{font-size:13px;color:var(--peri);text-decoration:none;font-weight:600;transition:color .25s var(--ease)}
    .forgot-password a:hover{color:var(--teal)}

    .btn{
      width:100%;padding:15px 20px;border:none;border-radius:14px;
      font-size:15.5px;font-weight:700;cursor:pointer;position:relative;overflow:hidden;
      transition:transform .3s var(--ease),box-shadow .3s var(--ease);
      display:flex;align-items:center;justify-content:center;gap:9px;letter-spacing:.01em;
    }
    .btn-primary{
      background:var(--aurora);color:#04121A;
      box-shadow:0 12px 34px -6px rgba(61,232,197,.5),0 2px 0 rgba(255,255,255,.25) inset;
    }
    /* moving sheen */
    .btn-primary::after{
      content:'';position:absolute;inset:0;border-radius:inherit;
      background:linear-gradient(110deg,transparent 30%,rgba(255,255,255,.55) 50%,transparent 70%);
      transform:translateX(-120%);transition:transform .7s var(--ease);
    }
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 18px 44px -6px rgba(61,232,197,.62),0 2px 0 rgba(255,255,255,.3) inset}
    .btn-primary:hover::after{transform:translateX(120%)}
    .btn-primary:active{transform:translateY(0)}

    .divider{display:flex;align-items:center;gap:14px;margin:24px 0;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.12em}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line)}

    .social-logins{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
    .social-btn{
      padding:12px 16px;border:1.5px solid var(--line);background:var(--field);
      border-radius:13px;font-size:14px;font-weight:600;color:var(--text);cursor:pointer;
      transition:border-color .25s var(--ease),background .25s var(--ease),transform .25s var(--ease);
      text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px;
    }
    .social-btn:hover{border-color:var(--line-strong);background:var(--field-focus);transform:translateY(-2px)}

    .signup-link{text-align:center;font-size:14px;color:var(--muted)}
    .signup-link a{color:var(--teal);font-weight:700;text-decoration:none;transition:opacity .25s var(--ease)}
    .signup-link a:hover{opacity:.8}

    .demo-info{
      background:rgba(61,232,197,.06);border:1px solid rgba(61,232,197,.2);border-left:3px solid var(--teal);
      padding:12px 14px;border-radius:11px;font-size:13px;color:var(--text);margin-bottom:18px;
    }
    .demo-info strong{color:var(--teal)}

    /* Role tabs — segmented, glassy */
    .role-tabs{
      display:flex;gap:4px;background:rgba(255,255,255,.045);
      padding:5px;border-radius:15px;margin-bottom:24px;border:1px solid var(--line);
    }
    .role-tab{
      flex:1;border:none;background:transparent;padding:11px 8px;border-radius:11px;
      font-family:'Schibsted Grotesk',sans-serif;font-size:13px;letter-spacing:.02em;
      font-weight:700;color:var(--muted);cursor:pointer;
      transition:all .24s cubic-bezier(.22,1,.36,1);
    }
    .role-tab:hover:not(.on){color:var(--text)}
    .role-tab.on{
      background:linear-gradient(180deg,rgba(61,232,197,.16),rgba(61,232,197,.08));
      color:var(--teal);box-shadow:0 4px 16px rgba(61,232,197,.18),0 0 0 1px rgba(61,232,197,.35) inset;
    }

    .auth-error{
      background:rgba(255,90,95,.1);border:1px solid rgba(255,90,95,.3);border-left:3px solid #FF5A5F;
      color:#FF9AA0;padding:11px 13px;border-radius:11px;font-size:13px;margin-bottom:14px;
      animation:errShake .35s cubic-bezier(.36,.07,.19,.97);
    }
    @keyframes errShake{
      10%,90%{transform:translateX(-1px)}20%,80%{transform:translateX(2px)}
      30%,50%,70%{transform:translateX(-3px)}40%,60%{transform:translateX(3px)}
    }

    /* floating theme toggle */
    [data-theme-toggle]{
      position:fixed;top:22px;right:22px;z-index:50;
      width:44px;height:44px;border-radius:12px;border:1px solid var(--line);
      background:rgba(255,255,255,.04);backdrop-filter:blur(10px);color:var(--text);
      cursor:pointer;font-size:0;display:flex;align-items:center;justify-content:center;
      transition:border-color .25s var(--ease),background .25s var(--ease);
    }
    [data-theme-toggle]:hover{border-color:var(--line-strong);background:rgba(255,255,255,.08)}

    /* OTP inputs */
    .otp-digit{
      width:100%;height:56px;text-align:center;font-size:22px;font-weight:700;
      border:1.5px solid var(--line);border-radius:13px;background:var(--field);color:var(--text);
      font-family:inherit;padding:0;transition:all .25s var(--ease);
    }
    .otp-digit:focus{outline:none;border-color:rgba(61,232,197,.7);background:var(--field-focus);box-shadow:0 0 0 4px rgba(61,232,197,.13)}

    @media (max-width:480px){
      .container{border-radius:20px;padding:32px 22px}
      h1{font-size:30px}
      .social-logins{grid-template-columns:1fr}
    }

    /* ---------- LIGHT MODE (opt-in via toggle) ---------- */
    html.light-mode body{background:#EEF1F7;color:#0F1425}
    html.light-mode .bg-elements::before{background-image:linear-gradient(rgba(15,23,42,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(15,23,42,.04) 1px,transparent 1px)}
    html.light-mode .gradient-orb{opacity:.28;mix-blend-mode:normal}
    html.light-mode .container{background:rgba(255,255,255,.82);border-color:rgba(15,23,42,.08);box-shadow:0 34px 80px -22px rgba(20,30,60,.28)}
    html.light-mode h1{color:#0F1425}
    html.light-mode .subtitle,html.light-mode label,html.light-mode .signup-link,html.light-mode .divider{color:#5C6478}
    html.light-mode input{background:#F5F7FB;border-color:rgba(15,23,42,.1);color:#0F1425}
    html.light-mode input::placeholder{color:#9AA3B8}
    html.light-mode .social-btn{background:#F5F7FB;border-color:rgba(15,23,42,.1);color:#0F1425}
    html.light-mode .role-tabs{background:#EAEEF5;border-color:rgba(15,23,42,.06)}
    html.light-mode .otp-digit{background:#F5F7FB;border-color:rgba(15,23,42,.1);color:#0F1425}
    html.light-mode [data-theme-toggle]{background:rgba(15,23,42,.04);border-color:rgba(15,23,42,.1);color:#0F1425}
  </style>
  <!-- Apply saved light/dark before paint (dark is the default). -->
  <script>try{if(localStorage.getItem('edulearn-theme')==='light')document.documentElement.classList.add('light-mode');}catch(e){}</script>
</head>
<body>

  <button data-theme-toggle aria-label="Toggle theme">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
  </button>

  <div class="bg-elements">
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>
    <div class="gradient-orb orb-3"></div>
  </div>

  <div class="container">
    <div class="logo reveal d1">
      <svg class="logo-mark" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 1.5 L14.6 9.4 L22.5 12 L14.6 14.6 L12 22.5 L9.4 14.6 L1.5 12 L9.4 9.4 Z" fill="url(#auroraGrad)"/>
      </svg>
      <svg width="0" height="0" style="position:absolute">
        <defs>
          <linearGradient id="auroraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3DE8C5"/>
            <stop offset="48%" stop-color="#7C9BFF"/>
            <stop offset="100%" stop-color="#FFB454"/>
          </linearGradient>
        </defs>
      </svg>
      <span class="logo-text">EduLearn</span>
    </div>

    <div id="loginFormView">
      <h1 class="reveal d2">Welcome back</h1>
      <p class="subtitle reveal d2">Sign in to continue your learning journey</p>

      <!-- Role tabs -->
      <div class="role-tabs reveal d3" id="roleTabs" role="tablist" aria-label="Login as">
        <button type="button" class="role-tab on" data-role="student" role="tab" aria-selected="true">Student</button>
        <button type="button" class="role-tab" data-role="teacher" role="tab" aria-selected="false">Teacher</button>
        <button type="button" class="role-tab" data-role="parent" role="tab" aria-selected="false">Parent</button>
      </div>

      <form onsubmit="handleLogin(event)">
        <div class="form-group reveal d4">
          <label for="email">Email Address</label>
          <div class="field-wrap">
            <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2.5" y="4.5" width="19" height="15" rx="2.5"/><path d="m3 6 9 6 9-6"/></svg>
            <input type="email" id="email" placeholder="you@example.com" required>
          </div>
        </div>

        <div class="form-group reveal d4">
          <label for="password">Password</label>
          <div class="pw-field field-wrap">
            <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="10.5" width="16" height="10" rx="2.5"/><path d="M8 10.5V7a4 4 0 0 1 8 0v3.5"/></svg>
            <input type="password" id="password" placeholder="••••••••" required>
            <button type="button" class="pw-toggle" id="pwToggle" aria-label="Show password" aria-pressed="false">
              <svg class="eye" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1.5 12s4-7.5 10.5-7.5S22.5 12 22.5 12s-4 7.5-10.5 7.5S1.5 12 1.5 12Z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-off" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l18 18"/><path d="M10.6 5.1A10.8 10.8 0 0 1 12 5c6.5 0 10.5 7 10.5 7a15.7 15.7 0 0 1-3.4 4.2M6.7 6.7C3.9 8.5 1.5 12 1.5 12s4 7 10.5 7c1.5 0 2.9-.3 4.1-.9"/><path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"/></svg>
            </button>
          </div>
        </div>

        <div id="loginError" class="auth-error" style="display:none"></div>

        <div class="forgot-password reveal d4">
          <a href="#">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary reveal d5">
          <span>Sign In</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>

        <div class="divider reveal d6">or continue with</div>

        <div class="social-logins reveal d6">
          <button type="button" class="social-btn" onclick="handleSocial('google')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Google
          </button>
          <button type="button" class="social-btn" onclick="handleSocial('apple')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 13.5c-.91 2.13-.505 4.26 1.75 5.59.94.565 2.05.96 3.25 1.12-.15 1.17-.915 2.08-1.915 2.38-1.94.585-4.42.19-6.64-1.05-.68-.37-1.28-.86-1.81-1.41-.53.55-1.13 1.04-1.81 1.41-2.22 1.24-4.7 1.635-6.64 1.05-1-.3-1.765-1.21-1.915-2.38 1.2-.16 2.31-.555 3.25-1.12 2.255-1.33 2.66-3.46 1.75-5.59-1.755-4.18-7.805-5.06-7.805-5.06 0-.39.04-.78.11-1.16 6.265-.365 8.715 2.645 10.985 4.47 2.27-1.825 4.72-4.835 10.985-4.47.07.38.11.77.11 1.16 0 0-6.05.88-7.805 5.06z"/></svg>
            Apple
          </button>
        </div>
      </form>

      <p class="signup-link reveal d6">
        Don't have an account? <a href="signup.html">Sign up for free</a>
      </p>
    </div>

    <!-- OTP Form View -->
    <div id="otpFormView" style="display:none">
      <h1>Verification Code</h1>
      <p class="subtitle" id="otpSubtitle" style="margin-bottom:20px">Please enter the 6-digit code sent to your email</p>

      <!-- Channel selector if both email and phone are available -->
      <div id="otpChannelSelector" style="display:none;margin-bottom:16px;text-align:center">
        <span style="font-size:13px;color:#6B7280">Send code via:</span>
        <button type="button" id="channelBtnEmail" class="social-btn" style="display:inline-flex;padding:6px 12px;font-size:12px;margin-left:6px" onclick="setOtpChannel('email')">Email</button>
        <button type="button" id="channelBtnPhone" class="social-btn" style="display:inline-flex;padding:6px 12px;font-size:12px;margin-left:6px" onclick="setOtpChannel('phone')">Phone</button>
      </div>

      <div id="devCodeAlert" class="demo-info" style="display:none">
        <strong>Demo OTP:</strong> <span id="devCodeVal" style="font-family:monospace;font-size:16px;font-weight:bold;letter-spacing:1px"></span>
      </div>

      <form onsubmit="handleVerifyOtp(event)">
        <!-- OTP Inputs -->
        <div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:24px" class="otp-inputs-wrapper">
          <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
          <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
          <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
          <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
          <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
          <input type="text" class="otp-digit" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
        </div>

        <div id="otpError" class="auth-error" style="display:none"></div>

        <button type="submit" class="btn btn-primary" id="verifyOtpBtn" style="margin-bottom:16px">
          <span>Verify & Continue</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>

        <div style="text-align:center;font-size:14px;color:#6B7280;margin-bottom:16px">
          Didn't receive the code? 
          <a href="#" id="resendOtpLink" onclick="resendOtp(event)" style="color:var(--teal);text-decoration:none;font-weight:700">Resend Code</a>
          <span id="resendTimerText" style="display:none">in <span id="resendCountdown">60</span>s</span>
        </div>

        <div style="text-align:center;font-size:14px">
          <a href="#" onclick="showLoginView(event)" style="color:#6B7280;text-decoration:none;font-weight:600">← Back to Login</a>
        </div>
      </form>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    // Already signed in (e.g. arrived here via a stale bookmark or the logo
    // fallback) — skip the login form entirely instead of asking to re-enter
    // credentials for a session that's still valid.
    if (window.EduAPI && EduAPI.getUser()) {
      location.replace('dashboard.html');
    }

    var selectedRole = 'student';

    // Show/hide password toggle.
    (function () {
      var toggle = document.getElementById('pwToggle');
      var input = document.getElementById('password');
      if (!toggle || !input) return;
      toggle.addEventListener('click', function () {
        var shown = input.type === 'text';
        input.type = shown ? 'password' : 'text';
        toggle.classList.toggle('is-shown', !shown);
        toggle.setAttribute('aria-pressed', String(!shown));
        toggle.setAttribute('aria-label', shown ? 'Show password' : 'Hide password');
      });
    })();

    document.querySelectorAll('.role-tab').forEach(function (tab) {
      tab.addEventListener('click', function () {
        document.querySelectorAll('.role-tab').forEach(function (t) {
          t.classList.remove('on');
          t.setAttribute('aria-selected', 'false');
        });
        tab.classList.add('on');
        tab.setAttribute('aria-selected', 'true');
        selectedRole = tab.getAttribute('data-role');
      });
    });

    function showError(msg) {
      var el = document.getElementById('loginError');
      el.textContent = msg;
      el.style.display = 'block';
    }

    // OTP global state
    var otpState = {
      userId: null,
      email: null,
      phone: null,
      emailVerified: false,
      phoneVerified: false,
      channel: 'email',
      resendTimer: null,
      resendCountdown: 0
    };

    function setupOtpInputs() {
      var inputs = document.querySelectorAll('.otp-digit');
      inputs.forEach(function (input, idx) {
        input.addEventListener('input', function (e) {
          var val = input.value;
          if (val.length === 1 && idx < inputs.length - 1) {
            inputs[idx + 1].focus();
          }
        });
        input.addEventListener('keydown', function (e) {
          if (e.key === 'Backspace' && input.value === '' && idx > 0) {
            inputs[idx - 1].focus();
          }
        });
        input.addEventListener('paste', function (e) {
          e.preventDefault();
          var pasteData = (e.clipboardData || window.clipboardData).getData('text').trim();
          if (pasteData.length === 6 && /^\d+$/.test(pasteData)) {
            inputs.forEach(function (inp, i) {
              inp.value = pasteData[i];
            });
            inputs[5].focus();
          }
        });
      });
    }

    function showLoginView(e) {
      if (e) e.preventDefault();
      document.getElementById('loginFormView').style.display = '';
      document.getElementById('otpFormView').style.display = 'none';
      if (otpState.resendTimer) clearInterval(otpState.resendTimer);
    }

    function startResendTimer() {
      var resendLink = document.getElementById('resendOtpLink');
      var timerText = document.getElementById('resendTimerText');
      var countdownVal = document.getElementById('resendCountdown');
      
      otpState.resendCountdown = 60;
      resendLink.style.display = 'none';
      timerText.style.display = 'inline';
      countdownVal.textContent = otpState.resendCountdown;

      if (otpState.resendTimer) clearInterval(otpState.resendTimer);

      otpState.resendTimer = setInterval(function () {
        otpState.resendCountdown--;
        countdownVal.textContent = otpState.resendCountdown;
        if (otpState.resendCountdown <= 0) {
          clearInterval(otpState.resendTimer);
          resendLink.style.display = 'inline';
          timerText.style.display = 'none';
        }
      }, 1000);
    }

    async function triggerSendOtp(channel) {
      document.getElementById('otpError').style.display = 'none';
      document.getElementById('devCodeAlert').style.display = 'none';
      otpState.channel = channel;
      try {
        var res = await EduAPI.sendOtp(channel, undefined, otpState.userId);
        if (res.devCode) {
          document.getElementById('devCodeVal').textContent = res.devCode;
          document.getElementById('devCodeAlert').style.display = 'block';
        }
        startResendTimer();
      } catch (err) {
        var el = document.getElementById('otpError');
        el.textContent = err.message;
        el.style.display = 'block';
      }
    }

    async function resendOtp(e) {
      if (e) e.preventDefault();
      if (otpState.resendCountdown > 0) return;
      await triggerSendOtp(otpState.channel);
    }

    function showOtpView(userId, email, phone, emailVerified, phoneVerified) {
      otpState.userId = userId;
      otpState.email = email;
      otpState.phone = phone;
      otpState.emailVerified = !!emailVerified;
      otpState.phoneVerified = !!phoneVerified;

      document.getElementById('loginFormView').style.display = 'none';
      document.getElementById('otpFormView').style.display = '';

      determineNextStep();
    }

    function determineNextStep() {
      var inputs = document.querySelectorAll('.otp-digit');
      inputs.forEach(function (inp) { inp.value = ''; });
      if (inputs[0]) inputs[0].focus();

      // Count how many steps are needed
      var needEmail = !otpState.emailVerified;
      var needPhone = !otpState.phoneVerified;
      var totalSteps = (needEmail ? 1 : 0) + (needPhone ? 1 : 0);

      if (needEmail) {
        otpState.channel = 'email';
        var prefix = totalSteps > 1 ? 'Step 1 of 2: ' : '';
        document.getElementById('otpSubtitle').textContent = prefix + 'Please enter the 6-digit code sent to your email ' + otpState.email;
        triggerSendOtp('email');
      } else if (needPhone) {
        otpState.channel = 'phone';
        var prefix = totalSteps > 1 ? 'Step 2 of 2: ' : '';
        document.getElementById('otpSubtitle').textContent = prefix + 'Enter the 6-digit code sent to your phone ' + otpState.phone;
        triggerSendOtp('phone');
      } else {
        completeVerification();
      }
    }

    async function completeVerification() {
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      try {
        await EduAPI.login(email, password, selectedRole);
        window.location.href = 'dashboard.html';
      } catch (err) {
        var el = document.getElementById('otpError');
        el.textContent = err.message;
        el.style.display = 'block';
      }
    }

    async function handleVerifyOtp(e) {
      e.preventDefault();
      document.getElementById('otpError').style.display = 'none';
      var inputs = document.querySelectorAll('.otp-digit');
      var code = '';
      inputs.forEach(function (inp) {
        code += inp.value.trim();
      });
      if (code.length !== 6) {
        var el = document.getElementById('otpError');
        el.textContent = 'Please enter all 6 digits.';
        el.style.display = 'block';
        return;
      }

      var verifyBtn = document.getElementById('verifyOtpBtn');
      var btnSpan = verifyBtn.querySelector('span');
      var original = btnSpan ? btnSpan.textContent : '';
      if (btnSpan) btnSpan.textContent = 'Verifying…';

      try {
        var res = await EduAPI.verifyOtp(otpState.channel, code, undefined, otpState.userId);
        if (res.verified) {
          if (otpState.channel === 'email') {
            otpState.emailVerified = true;
          } else {
            otpState.phoneVerified = true;
          }
          if (btnSpan) btnSpan.textContent = original;
          determineNextStep();
        } else {
          throw new Error('Verification failed.');
        }
      } catch (err) {
        var el = document.getElementById('otpError');
        el.textContent = err.message;
        el.style.display = 'block';
        if (btnSpan) btnSpan.textContent = original;
      }
    }

    // Call input binding setup
    setupOtpInputs();

    async function handleLogin(e) {
      e.preventDefault();
      document.getElementById('loginError').style.display = 'none';
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var btn = e.target.querySelector('button[type="submit"] span');
      var original = btn ? btn.textContent : '';
      if (btn) btn.textContent = 'Signing in…';

      try {
        var user = await EduAPI.login(email, password, selectedRole);
        window.location.href = 'dashboard.html';
      } catch (err) {
        if (err.code === 'VERIFICATION_REQUIRED') {
          if (btn) btn.textContent = original;
          showOtpView(err.userId, err.email, err.phone, err.emailVerified, err.phoneVerified);
        } else {
          showError(err.message);
          if (btn) btn.textContent = original;
        }
      }
    }

    function handleSocial(provider) {
      alert(provider.toUpperCase() + ' login coming soon! Use the demo accounts for now.');
    }
  </script>

  <!-- Self-contained theme toggle. This page is DARK by default (premium look);
       users can switch to light. Independent of the app-wide theme.js so the
       default isn't inverted. Stored under the same key for consistency. -->
  <script>
    (function () {
      var KEY = 'edulearn-theme';
      var root = document.documentElement;
      function apply(t) {
        // dark = no class (CSS default); light = .light-mode
        root.classList.toggle('light-mode', t === 'light');
      }
      var saved = 'dark';
      try { saved = localStorage.getItem(KEY) || 'dark'; } catch (e) {}
      apply(saved);
      var btn = document.querySelector('[data-theme-toggle]');
      if (btn) btn.addEventListener('click', function () {
        var now = root.classList.contains('light-mode') ? 'dark' : 'light';
        apply(now);
        try { localStorage.setItem(KEY, now); } catch (e) {}
      });
    })();
  </script>
</body>
</html>
