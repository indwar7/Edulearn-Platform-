<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Apply saved theme before paint to avoid a light-mode flash. -->
  <script>try{if(localStorage.getItem('edulearn-theme')==='dark')document.documentElement.classList.add('dark-mode');}catch(e){}</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Lectures — EduLearn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,480&family=Schibsted+Grotesk:wght@400;500;600;700&family=Fragment+Mono&display=swap" rel="stylesheet">
  <style>
    :root{
      --ink:#1A1F36;--bg:#F7F9FC;--card:#FFFFFF;--muted:#6B7280;--bg2:#F5F7FA;
      --line:rgba(15,23,42,.10);--teal:#0FA983;
      --aurora:linear-gradient(115deg,#3DE8C5 0%,#7C9BFF 48%,#FFB454 100%);
      --ease:cubic-bezier(.22,1,.36,1);--shadow:0 18px 44px rgba(15,23,42,.10);
    }
    /* Dark mode: remap the page's own variables so the whole UI flips. */
    html.dark-mode{
      --ink:#F5F7FA;--bg:#0F172A;--bg2:#1E293B;--card:#1A2847;
      --muted:#94A3B8;--line:rgba(255,255,255,.12);
      --shadow:0 18px 44px rgba(0,0,0,.45);
    }
    *{box-sizing:border-box;}
    body{margin:0;font-family:'Schibsted Grotesk',system-ui,sans-serif;background:var(--bg);color:var(--ink);}
    .wrap{max-width:1100px;margin:0 auto;padding:36px 24px 60px;}
    .top{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;}
    h1{font-family:'Fraunces',serif;font-weight:480;font-size:32px;margin:0;}
    h1 em{font-style:italic;background:var(--aurora);-webkit-background-clip:text;background-clip:text;color:transparent;}
    .sub{color:var(--muted);font-size:14px;margin:6px 0 0;}
    .btn{border:none;border-radius:11px;background:var(--aurora);color:#0B1224;font-weight:700;font-size:14px;padding:11px 18px;cursor:pointer;text-decoration:none;display:inline-block;transition:transform .2s,box-shadow .2s;}
    .btn:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(61,232,197,.3);}
    .filters{display:flex;gap:6px;background:#EEF1F6;padding:5px;border-radius:13px;width:max-content;margin:22px 0;flex-wrap:wrap;}
    .filters button{border:none;background:transparent;padding:9px 15px;border-radius:9px;font-family:'Fragment Mono',monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;color:#5A6175;cursor:pointer;transition:all .2s var(--ease);}
    .filters button.on{background:#fff;color:var(--teal);box-shadow:0 3px 12px rgba(15,23,42,.1);}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;}
    .vcard{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;cursor:pointer;transition:transform .26s var(--ease),box-shadow .26s var(--ease);}
    .vcard:hover{transform:translateY(-4px);box-shadow:var(--shadow);}
    .thumb{height:150px;background:var(--aurora);display:flex;align-items:center;justify-content:center;font-size:44px;position:relative;}
    .thumb .play{width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;font-size:20px;color:#0B1224;}
    .vbody{padding:16px 18px 18px;}
    .vtitle{font-weight:700;font-size:16px;letter-spacing:-.01em;margin-bottom:6px;}
    .vmeta{font-size:12px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
    .tag{font-family:'Fragment Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;background:var(--bg2);padding:3px 8px;border-radius:6px;}
    .by{margin-top:8px;font-size:12px;color:var(--muted);}
    .empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted);}
    .empty a{color:var(--teal);font-weight:600;text-decoration:none;}
    .err{margin:16px 0;padding:14px 16px;border-radius:12px;background:rgba(226,76,77,.1);color:#C2181C;}

    /* player modal */
    .modal{position:fixed;inset:0;background:rgba(15,23,42,.8);backdrop-filter:blur(4px);z-index:9000;display:none;align-items:center;justify-content:center;padding:24px;}
    .modal.open{display:flex;}
    .player{background:#000;border-radius:16px;overflow:hidden;max-width:900px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.5);}
    .vidwrap{position:relative;background:#000;}
    .vidwrap video{width:100%;display:block;max-height:70vh;background:#000;}
    .vidwrap:fullscreen{display:flex;align-items:center;justify-content:center;}
    .vidwrap:fullscreen video{max-height:100vh;}
    .center-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:74px;height:74px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;display:flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer;transition:opacity .2s,transform .2s;pointer-events:none;opacity:0;}
    .vidwrap.paused .center-play{opacity:1;}
    /* control bar */
    .controls{position:absolute;left:0;right:0;bottom:0;padding:8px 14px 12px;background:linear-gradient(transparent,rgba(0,0,0,.78));opacity:0;transition:opacity .25s;}
    .vidwrap:hover .controls,.vidwrap.paused .controls{opacity:1;}
    .seek{width:100%;height:5px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.28);border-radius:999px;cursor:pointer;margin:0 0 8px;}
    .seek::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#3DE8C5;box-shadow:0 0 0 4px rgba(61,232,197,.3);cursor:pointer;}
    .seek::-moz-range-thumb{width:14px;height:14px;border:none;border-radius:50%;background:#3DE8C5;cursor:pointer;}
    .ctrl-row{display:flex;align-items:center;gap:8px;}
    .cbtn{border:none;background:transparent;color:#fff;font-size:16px;cursor:pointer;padding:6px 8px;border-radius:8px;display:inline-flex;align-items:center;gap:1px;transition:background .15s;}
    .cbtn small{font-size:9px;opacity:.8;}
    .cbtn:hover{background:rgba(255,255,255,.16);}
    .time{color:#fff;font-family:'Fragment Mono',monospace;font-size:12px;margin-left:4px;}
    .spacer{flex:1;}
    .vol{display:flex;align-items:center;gap:4px;}
    .volbar{width:70px;height:4px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.3);border-radius:999px;cursor:pointer;}
    .volbar::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:#fff;cursor:pointer;}
    .speed{background:rgba(255,255,255,.16);color:#fff;border:none;border-radius:8px;padding:5px 7px;font-size:12px;cursor:pointer;font-family:inherit;}
    .speed option{color:#1A1F36;}
    .pbar{background:var(--card);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
    .pbar h3{margin:0;font-size:16px;}
    .pbar .x{border:none;background:var(--bg2);width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:16px;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>Video <em>Lectures</em></h1>
        <p class="sub" id="sub">Loading your lectures…</p>
      </div>
      <a class="btn" href="dashboard.html">← Dashboard</a>
    </div>

    <div class="filters" id="filters"></div>
    <div id="errBox"></div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="modal" id="modal">
    <div class="player">
      <div class="vidwrap" id="vidwrap">
        <video id="player" playsinline></video>
        <div class="center-play" id="centerPlay">▶</div>
        <!-- custom control bar -->
        <div class="controls" id="controls">
          <input type="range" id="seek" class="seek" min="0" max="100" value="0" step="0.1">
          <div class="ctrl-row">
            <button class="cbtn" id="btnPlay" title="Play/Pause (Space)">▶</button>
            <button class="cbtn" id="btnBack" title="Back 10s (←)">⏪<small>10</small></button>
            <button class="cbtn" id="btnFwd" title="Forward 10s (→)">⏩<small>10</small></button>
            <span class="time" id="time">0:00 / 0:00</span>
            <div class="spacer"></div>
            <div class="vol">
              <button class="cbtn" id="btnMute" title="Mute (M)">🔊</button>
              <input type="range" id="volume" class="volbar" min="0" max="1" step="0.05" value="1">
            </div>
            <select id="speed" class="speed" title="Playback speed">
              <option value="0.5">0.5×</option>
              <option value="1" selected>1×</option>
              <option value="1.25">1.25×</option>
              <option value="1.5">1.5×</option>
              <option value="2">2×</option>
            </select>
            <button class="cbtn" id="btnFull" title="Fullscreen (F)">⛶</button>
          </div>
        </div>
      </div>
      <div class="pbar"><h3 id="playerTitle"></h3><button class="x" id="closePlayer">✕</button></div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="../theme.js"></script>
  <script>
    var API = (localStorage.getItem('edulearn_api') || 'https://d3cxm67a2ygkx3.cloudfront.net');
    var user = EduAPI.requireAuth(); // redirects to login if not authed
    var ALL = [];
    var subjectFilter = 'all';

    function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

    async function load(){
      var sub = document.getElementById('sub');
      try {
        // Students see their class; teachers/parents see all (could refine later).
        var q = '';
        if (user.role === 'student' && user.className) q = '?className=' + encodeURIComponent(user.className);
        var data = await EduAPI.getDashboard ? null : null; // (kept simple)
        var res = await fetch(API + '/api/videos' + q, { headers:{ 'Authorization':'Bearer '+EduAPI.getToken() }, credentials:'include' });
        if (!res.ok) throw new Error('Server '+res.status);
        var j = await res.json();
        ALL = j.videos || [];
        sub.textContent = user.role==='student'
          ? (user.className ? ('Lectures for ' + user.className) : 'All lectures')
          : 'All lectures on the platform';
        buildFilters(); render();
      } catch(e){
        document.getElementById('errBox').innerHTML = '<div class="err">Cannot load videos. Is the backend running? '+esc(e.message)+'</div>';
      }
    }

    function buildFilters(){
      var subjects = ['all'].concat(Array.from(new Set(ALL.map(function(v){return v.subject;}))));
      document.getElementById('filters').innerHTML = subjects.map(function(s,i){
        return '<button class="'+(i===0?'on':'')+'" data-s="'+esc(s)+'">'+(s==='all'?'All Subjects':esc(s))+'</button>';
      }).join('');
      document.querySelectorAll('#filters button').forEach(function(b){
        b.addEventListener('click', function(){
          document.querySelectorAll('#filters button').forEach(function(x){x.classList.remove('on');});
          b.classList.add('on'); subjectFilter = b.getAttribute('data-s'); render();
        });
      });
    }

    function render(){
      var grid = document.getElementById('grid');
      var list = ALL.filter(function(v){ return subjectFilter==='all' || v.subject===subjectFilter; });
      if (!list.length){
        grid.innerHTML = '<div class="empty">No lectures here yet.' +
          (user.role==='teacher' ? ' <a href="upload.html">Upload one →</a>' : '') + '</div>';
        return;
      }
      grid.innerHTML = list.map(function(v){
        return '<div class="vcard" data-id="'+v.id+'" data-title="'+esc(v.title)+'">'+
          '<div class="thumb"><div class="play">▶</div></div>'+
          '<div class="vbody">'+
            '<div class="vtitle">'+esc(v.title)+'</div>'+
            '<div class="vmeta"><span class="tag">'+esc(v.className)+'</span><span class="tag">'+esc(v.subject)+'</span>'+(v.topic?'<span>'+esc(v.topic)+'</span>':'')+'</div>'+
            '<div class="by">By '+esc(v.uploadedByName||'Teacher')+' · '+v.views+' views</div>'+
          '</div></div>';
      }).join('');
      document.querySelectorAll('.vcard').forEach(function(c){
        c.addEventListener('click', function(){ play(c.getAttribute('data-id'), c.getAttribute('data-title')); });
      });
    }

    // ---------- custom player ----------
    var modal = document.getElementById('modal');
    var player = document.getElementById('player');
    var wrap = document.getElementById('vidwrap');
    var seek = document.getElementById('seek');
    var btnPlay = document.getElementById('btnPlay');
    var fmtT = function(s){ s=Math.floor(s||0); var m=Math.floor(s/60); var x=s%60; return m+':'+(x<10?'0':'')+x; };

    function play(id, title){
      document.getElementById('playerTitle').textContent = title;
      // <video src> can't send an Authorization header, and streaming is now
      // eligibility-gated server-side — pass the token as a query param.
      player.src = API + '/api/videos/' + id + '/stream?token=' + encodeURIComponent(EduAPI.getToken());
      modal.classList.add('open');
      player.play().catch(function(){});
      EduAPI.recordVideoView(id);
    }
    function closePlayer(){
      player.pause(); player.removeAttribute('src'); player.load();
      modal.classList.remove('open');
    }
    function togglePlay(){ if (player.paused) player.play(); else player.pause(); }
    function skip(sec){ player.currentTime = Math.min(Math.max(0,(player.currentTime||0)+sec), player.duration||0); }

    // play/pause state → icon + center overlay
    player.addEventListener('play', function(){ btnPlay.textContent='⏸'; wrap.classList.remove('paused'); });
    player.addEventListener('pause', function(){ btnPlay.textContent='▶'; wrap.classList.add('paused'); });
    // progress + time
    player.addEventListener('timeupdate', function(){
      if (player.duration){ seek.value = (player.currentTime/player.duration)*100; }
      document.getElementById('time').textContent = fmtT(player.currentTime)+' / '+fmtT(player.duration);
    });
    seek.addEventListener('input', function(){ if (player.duration) player.currentTime = (seek.value/100)*player.duration; });

    // buttons
    btnPlay.addEventListener('click', togglePlay);
    player.addEventListener('click', togglePlay);
    document.getElementById('centerPlay').addEventListener('click', togglePlay);
    document.getElementById('btnBack').addEventListener('click', function(){ skip(-10); });
    document.getElementById('btnFwd').addEventListener('click', function(){ skip(10); });
    document.getElementById('speed').addEventListener('change', function(){ player.playbackRate = parseFloat(this.value); });
    // volume + mute
    var vol = document.getElementById('volume'), btnMute = document.getElementById('btnMute');
    vol.addEventListener('input', function(){ player.volume = parseFloat(vol.value); player.muted = (vol.value==0); btnMute.textContent = vol.value==0?'🔇':'🔊'; });
    btnMute.addEventListener('click', function(){ player.muted = !player.muted; btnMute.textContent = player.muted?'🔇':'🔊'; vol.value = player.muted?0:player.volume; });
    // fullscreen
    document.getElementById('btnFull').addEventListener('click', function(){
      if (document.fullscreenElement) document.exitFullscreen();
      else wrap.requestFullscreen && wrap.requestFullscreen();
    });

    // keyboard shortcuts (only when player open)
    document.addEventListener('keydown', function(e){
      if (!modal.classList.contains('open')) return;
      if (e.key===' '){ e.preventDefault(); togglePlay(); }
      else if (e.key==='ArrowLeft'){ skip(-10); }
      else if (e.key==='ArrowRight'){ skip(10); }
      else if (e.key.toLowerCase()==='f'){ document.getElementById('btnFull').click(); }
      else if (e.key.toLowerCase()==='m'){ btnMute.click(); }
      else if (e.key==='Escape' && !document.fullscreenElement){ closePlayer(); }
    });

    document.getElementById('closePlayer').addEventListener('click', closePlayer);
    modal.addEventListener('click', function(e){ if (e.target.id==='modal') closePlayer(); });

    load();
  </script>
</body>
</html>
