<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Apply saved theme before paint to avoid a light-mode flash. -->
  <script>/* light-only product: strip any stale dark preference before paint */try{document.documentElement.classList.remove('dark-mode');localStorage.setItem('edulearn-theme','light');}catch(e){}</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Lectures — EduLearn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,480;9..144,600&family=Nunito:wght@400;500;600;700;800;900&family=Fragment+Mono&display=swap" rel="stylesheet">
  <style>
    :root{
      --ink:#1A1F36;--bg:#F7F9FC;--card:#FFFFFF;--muted:#64748B;--bg2:#F5F7FA;
      --line:rgba(15,23,42,.10);--teal:#10B981;
      --aurora:linear-gradient(115deg,#10B981 0%,#6366F1 48%,#F59E0B 100%);
      --ease:cubic-bezier(.22,1,.36,1);--shadow:0 18px 44px rgba(15,23,42,.10);
      --shadow-sm:0 6px 18px rgba(15,23,42,.08);
    }
    html.dark-mode{
      --ink:#F5F7FA;--bg:#0F172A;--bg2:#1E293B;--card:#1A2847;
      --muted:#94A3B8;--line:rgba(255,255,255,.12);
      --shadow:0 18px 44px rgba(0,0,0,.45);--shadow-sm:0 6px 18px rgba(0,0,0,.4);
    }
    *{box-sizing:border-box;}
    body{margin:0;font-family:'Nunito',system-ui,sans-serif;background:var(--bg);color:var(--ink);}
    .wrap{max-width:1240px;margin:0 auto;padding:32px 24px 72px;}
    @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}

    /* ---- header ---- */
    .top{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;}
    h1{font-family:'Fraunces',serif;font-weight:480;font-size:32px;margin:0;letter-spacing:-.01em;}
    h1 em{font-style:italic;background:var(--aurora);-webkit-background-clip:text;background-clip:text;color:transparent;}
    .sub{color:var(--muted);font-size:14px;margin:6px 0 0;}
    .btn{border:none;border-radius:11px;background:var(--aurora);color:#0B1224;font-weight:700;font-size:14px;padding:11px 18px;cursor:pointer;text-decoration:none;display:inline-block;transition:transform .2s,box-shadow .2s;}
    .btn:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(61,232,197,.3);}
    .btn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line);}

    /* ---- toolbar: subject filters + view toggle + search ---- */
    .toolbar{display:flex;align-items:center;gap:12px;margin:24px 0 10px;flex-wrap:wrap;}
    .filters{display:flex;gap:6px;background:var(--bg2);padding:5px;border-radius:13px;flex-wrap:wrap;}
    .filters button{border:none;background:transparent;padding:9px 15px;border-radius:9px;font-family:'Fragment Mono',monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s var(--ease);}
    .filters button.on{background:var(--card);color:var(--teal);box-shadow:var(--shadow-sm);}
    .filters button:focus-visible{outline:2px solid var(--teal);outline-offset:2px;}
    .grow{flex:1 1 40px;}
    .search{position:relative;min-width:180px;}
    .search input{width:100%;padding:10px 14px 10px 34px;border-radius:11px;border:1px solid var(--line);background:var(--card);color:var(--ink);font:inherit;font-size:14px;}
    .search input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(15,169,131,.15);}
    .search .sicon{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.6;color:var(--muted);pointer-events:none;}
    .vtoggle{display:flex;background:var(--bg2);border-radius:11px;padding:4px;gap:2px;}
    .vtoggle button{border:none;background:transparent;color:var(--muted);width:38px;height:32px;border-radius:8px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .18s;}
    .vtoggle button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow-sm);}
    .vtoggle button:focus-visible{outline:2px solid var(--teal);outline-offset:1px;}

    /* ---- featured hero ---- */
    .hero{position:relative;border-radius:22px;overflow:hidden;margin:14px 0 30px;min-height:230px;display:flex;align-items:flex-end;cursor:pointer;box-shadow:var(--shadow);border:1px solid var(--line);}
    .hero .hero-art{position:absolute;inset:0;z-index:0;}
    .hero .hero-glyph{position:absolute;right:-10px;bottom:-30px;font-size:200px;line-height:1;opacity:.22;z-index:1;color:#fff;filter:drop-shadow(0 8px 20px rgba(0,0,0,.25));}
    .hero .scrim{position:absolute;inset:0;z-index:2;background:linear-gradient(90deg,rgba(8,14,30,.82) 0%,rgba(8,14,30,.5) 45%,rgba(8,14,30,.15) 100%);}
    .hero-inner{position:relative;z-index:3;padding:30px 32px;color:#fff;max-width:640px;}
    .hero-eyebrow{font-family:'Fragment Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;opacity:.9;display:flex;align-items:center;gap:8px;}
    .hero-eyebrow .dot{width:6px;height:6px;border-radius:50%;background:#3DE8C5;box-shadow:0 0 0 4px rgba(61,232,197,.28);}
    .hero h2{font-family:'Fraunces',serif;font-weight:480;font-size:30px;margin:10px 0 8px;line-height:1.1;text-wrap:balance;}
    .hero p{margin:0 0 16px;font-size:14px;opacity:.85;line-height:1.5;max-width:80%;}
    .hero-cta{display:inline-flex;align-items:center;gap:9px;background:#fff;color:#0B1224;font-weight:700;font-size:14px;padding:11px 20px;border-radius:11px;transition:transform .2s;}
    .hero:hover .hero-cta{transform:translateX(3px);}
    .hero-meta{display:inline-flex;gap:14px;margin-left:14px;font-size:12.5px;color:rgba(255,255,255,.85);align-items:center;}
    /* CONTRAST GUARD — theme.css paints every h2/p/span/div with the theme's
       ink colour, which turned this banner's title black on its permanently
       dark artwork. The art + scrim are dark in BOTH themes, so the text here
       is explicitly light in both; the one light chip (Play now) keeps dark
       text. Rule of thumb: dark background → light font, light chip → dark. */
    .hero-inner, .hero-inner div, .hero-inner span, .hero h2{color:#fff;}
    .hero p{color:rgba(255,255,255,.88);}
    .hero-meta, .hero-meta span{color:rgba(255,255,255,.85);}
    .hero-cta, .hero-cta span, .hero-cta svg{color:#0B1224;}

    /* ---- shelves (Netflix rows) ---- */
    .shelf{margin:0 0 30px;}
    .shelf-head{display:flex;align-items:baseline;justify-content:space-between;margin:0 2px 12px;gap:12px;}
    .shelf-title{font-family:'Fraunces',serif;font-weight:700;font-size:22px;letter-spacing:-.015em;display:flex;align-items:center;gap:11px;line-height:1.15;}
    .shelf-title .pip{width:10px;height:10px;border-radius:3px;flex:none;}
    .shelf-count{font-family:'Fragment Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.05em;}
    .rail-outer{position:relative;}
    .rail{display:flex;gap:16px;overflow-x:auto;scroll-behavior:smooth;padding:4px 2px 12px;scroll-snap-type:x proximity;scrollbar-width:thin;}
    .rail::-webkit-scrollbar{height:8px;}
    .rail::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px;}
    .rail::-webkit-scrollbar-track{background:transparent;}
    .rail-btn{position:absolute;top:calc(50% - 30px);transform:translateY(-50%);z-index:5;width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:var(--card);color:var(--ink);font-size:16px;cursor:pointer;box-shadow:var(--shadow);display:none;align-items:center;justify-content:center;transition:transform .15s,opacity .2s;}
    .rail-outer:hover .rail-btn{display:flex;}
    .rail-btn:hover{transform:translateY(-50%) scale(1.08);}
    .rail-btn.prev{left:-8px;} .rail-btn.next{right:-8px;}
    @media (hover:none){.rail-btn{display:none!important;}}

    /* ---- cover card (shared by rail + grid) ---- */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:20px;}
    .vcard{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .24s var(--ease),box-shadow .24s var(--ease);position:relative;}
    .rail .vcard{flex:0 0 248px;scroll-snap-align:start;}
    .vcard:hover{transform:translateY(-5px);box-shadow:var(--shadow);}
    .vcard:focus-visible{outline:2px solid var(--teal);outline-offset:2px;}
    .cover{position:relative;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .cover .cglyph{font-size:56px;opacity:.9;color:#fff;filter:drop-shadow(0 6px 14px rgba(0,0,0,.28));transition:transform .3s var(--ease);}
    .vcard:hover .cover .cglyph{transform:scale(1.12) rotate(-4deg);}
    .cover .ep{position:absolute;top:9px;left:11px;font-family:'Fragment Mono',monospace;font-size:11px;font-weight:600;color:#fff;background:rgba(8,14,30,.42);backdrop-filter:blur(4px);padding:3px 8px;border-radius:7px;letter-spacing:.04em;}
    .cover .dur{position:absolute;bottom:9px;right:9px;font-family:'Fragment Mono',monospace;font-size:11px;color:#fff;background:rgba(8,14,30,.62);padding:3px 7px;border-radius:6px;font-variant-numeric:tabular-nums;}
    .cover .playbadge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.94);display:flex;align-items:center;justify-content:center;font-size:19px;color:#0B1224;opacity:0;transition:opacity .22s,transform .22s;box-shadow:0 8px 24px rgba(0,0,0,.3);}
    .vcard:hover .cover .playbadge{opacity:1;transform:translate(-50%,-50%) scale(1);}
    .cover .prog{position:absolute;left:0;right:0;bottom:0;height:4px;background:rgba(8,14,30,.35);}
    .cover .prog span{display:block;height:100%;background:#3DE8C5;}
    .watched-flag{position:absolute;top:9px;right:9px;background:var(--teal);color:#fff;font-size:11px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,.25);}
    .vbody{padding:13px 15px 15px;}
    .vtitle{font-weight:700;font-size:15px;letter-spacing:-.01em;line-height:1.28;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.5em;}
    .vmeta{font-size:12px;color:var(--muted);display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
    .tag{font-family:'Fragment Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;background:var(--bg2);padding:3px 8px;border-radius:6px;color:var(--muted);}
    .by{margin-top:9px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;}
    .by .av{width:19px;height:19px;border-radius:50%;background:var(--aurora);color:#0B1224;font-weight:700;font-size:10px;display:flex;align-items:center;justify-content:center;flex:none;}

    /* ---- list view ---- */
    .listwrap{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:var(--shadow-sm);}
    .lgroup-head{padding:15px 20px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;background:var(--bg2);}
    .lgroup-head .pip{width:9px;height:9px;border-radius:3px;}
    .lgroup-head b{font-family:'Fraunces',serif;font-weight:700;font-size:18px;letter-spacing:-.01em;}
    .lgroup-head .c{font-family:'Fragment Mono',monospace;font-size:11px;color:var(--muted);margin-left:auto;}
    .lrow{display:flex;align-items:center;gap:14px;padding:11px 18px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .14s;}
    .lrow:last-child{border-bottom:none;}
    .lrow:hover{background:var(--bg2);}
    .lrow:focus-visible{outline:2px solid var(--teal);outline-offset:-2px;}
    .lnum{font-family:'Fragment Mono',monospace;font-size:13px;color:var(--muted);width:26px;text-align:center;flex:none;font-variant-numeric:tabular-nums;}
    .lthumb{width:104px;aspect-ratio:16/9;border-radius:9px;overflow:hidden;flex:none;position:relative;display:flex;align-items:center;justify-content:center;}
    .lthumb .cglyph{font-size:28px;opacity:.92;color:#fff;}
    .lthumb .prog{position:absolute;left:0;right:0;bottom:0;height:3px;background:rgba(8,14,30,.35);}
    .lthumb .prog span{display:block;height:100%;background:#3DE8C5;}
    .linfo{flex:1;min-width:0;}
    .linfo .t{font-weight:600;font-size:15px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .linfo .m{font-size:12px;color:var(--muted);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap;}
    .ldur{font-family:'Fragment Mono',monospace;font-size:12.5px;color:var(--muted);flex:none;font-variant-numeric:tabular-nums;}
    .lplay{flex:none;width:34px;height:34px;border-radius:50%;background:var(--bg2);color:var(--ink);display:flex;align-items:center;justify-content:center;font-size:14px;transition:background .15s,transform .15s;}
    .lrow:hover .lplay{background:var(--aurora);color:#0B1224;transform:scale(1.06);}

    .empty{text-align:center;padding:70px 20px;color:var(--muted);}
    .empty .big{font-size:44px;margin-bottom:12px;opacity:.6;}
    .empty a{color:var(--teal);font-weight:600;text-decoration:none;}
    .err{margin:16px 0;padding:14px 16px;border-radius:12px;background:rgba(226,76,77,.1);color:#C2181C;}
    .skel{background:linear-gradient(90deg,var(--bg2) 25%,var(--line) 37%,var(--bg2) 63%);background-size:400% 100%;animation:sh 1.4s ease infinite;border-radius:16px;height:210px;}
    @keyframes sh{0%{background-position:100% 0;}100%{background-position:-100% 0;}}

    /* ---- player modal (kept, lightly refreshed) ---- */
    .modal{position:fixed;inset:0;background:rgba(15,23,42,.8);backdrop-filter:blur(4px);z-index:9000;display:none;align-items:center;justify-content:center;padding:24px;}
    .modal.open{display:flex;}
    .player{background:#000;border-radius:16px;overflow:hidden;max-width:920px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.5);}
    .vidwrap{position:relative;background:#000;}
    .vidwrap video{width:100%;display:block;max-height:70vh;background:#000;}
    .vidwrap:fullscreen{display:flex;align-items:center;justify-content:center;}
    .vidwrap:fullscreen video{max-height:100vh;}
    .center-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:74px;height:74px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;display:flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer;transition:opacity .2s,transform .2s;pointer-events:none;opacity:0;}
    .vidwrap.paused .center-play{opacity:1;}
    .controls{position:absolute;left:0;right:0;bottom:0;padding:8px 14px 12px;background:linear-gradient(transparent,rgba(0,0,0,.78));opacity:0;transition:opacity .25s;}
    .vidwrap:hover .controls,.vidwrap.paused .controls{opacity:1;}
    .seek{width:100%;height:5px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.28);border-radius:999px;cursor:pointer;margin:0 0 8px;}
    .seek::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#3DE8C5;box-shadow:0 0 0 4px rgba(61,232,197,.3);cursor:pointer;}
    .seek::-moz-range-thumb{width:14px;height:14px;border:none;border-radius:50%;background:#3DE8C5;cursor:pointer;}
    .ctrl-row{display:flex;align-items:center;gap:8px;}
    .cbtn{border:none;background:transparent;color:#fff;font-size:16px;cursor:pointer;padding:6px 8px;border-radius:8px;display:inline-flex;align-items:center;gap:1px;transition:background .15s;}
    .cbtn small{font-size:9px;opacity:.8;}
    .cbtn:hover{background:rgba(255,255,255,.16);}
    .time{color:#fff;font-family:'Fragment Mono',monospace;font-size:12px;margin-left:4px;font-variant-numeric:tabular-nums;}
    .spacer{flex:1;}
    .vol{display:flex;align-items:center;gap:4px;}
    .volbar{width:70px;height:4px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.3);border-radius:999px;cursor:pointer;}
    .volbar::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:#fff;cursor:pointer;}
    .speed{background:rgba(255,255,255,.16);color:#fff;border:none;border-radius:8px;padding:5px 7px;font-size:12px;cursor:pointer;font-family:inherit;}
    .speed option{color:#1A1F36;}
    .pbar{background:var(--card);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
    .pbar h3{margin:0;font-size:16px;font-weight:700;}
    .pbar .x{border:none;background:var(--bg2);width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:16px;color:var(--ink);display:flex;align-items:center;justify-content:center;}
  </style>

      <a class="btn ghost" href="dashboard.html">← Dashboard</a>

    <div class="toolbar">
      <!-- Demo/reviewer only: switch which class's library is shown. Hidden for

      <div class="vtoggle" role="tablist" aria-label="View">
        <button id="viewRows" class="on" title="Shelves view" aria-label="Shelves view"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/></svg></button>
        <button id="viewGrid" title="Grid view" aria-label="Grid view"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg></button>
        <button id="viewList" title="List view" aria-label="List view"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/></svg></button>
      </div>

    <div id="errBox"></div>
    <div id="stage"></div>
  </div>

  <div class="modal" id="modal">
    <div class="player">
      <div class="vidwrap" id="vidwrap">
        <video id="player" playsinline></video>
        <div class="center-play" id="centerPlay"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="6 3 20 12 6 21 6 3"/></svg></div>
        <div class="controls" id="controls">
          <input type="range" id="seek" class="seek" min="0" max="100" value="0" step="0.1" aria-label="Seek">
          <div class="ctrl-row">
            <button class="cbtn" id="btnPlay" title="Play/Pause (Space)" aria-label="Play or pause"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="6 3 20 12 6 21 6 3"/></svg></button>
            <button class="cbtn" id="btnBack" title="Back 10s (←)" aria-label="Back 10 seconds"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="11 19 2 12 11 5 11 19"/><polygon points="22 19 13 12 22 5 22 19"/></svg><small>10</small></button>
            <button class="cbtn" id="btnFwd" title="Forward 10s (→)" aria-label="Forward 10 seconds"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="13 19 22 12 13 5 13 19"/><polygon points="2 19 11 12 2 5 2 19"/></svg><small>10</small></button>
            <span class="time" id="time">0:00 / 0:00</span>
            <div class="spacer"></div>
            <div class="vol">
              <button class="cbtn" id="btnMute" title="Mute (M)" aria-label="Mute or unmute"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></button>
              <input type="range" id="volume" class="volbar" min="0" max="1" step="0.05" value="1" aria-label="Volume">
            </div>
            <select id="speed" class="speed" title="Playback speed" aria-label="Playback speed">
              <option value="0.5">0.5×</option>
              <option value="1" selected>1×</option>
              <option value="1.25">1.25×</option>
              <option value="1.5">1.5×</option>
              <option value="2">2×</option>
            </select>
            <button class="cbtn" id="btnFull" title="Fullscreen (F)" aria-label="Toggle fullscreen"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg></button>
          </div>
        </div>
      </div>
      <div class="pbar"><h3 id="playerTitle"></h3><button class="x" id="closePlayer" aria-label="Close"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button></div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="../theme.js"></script>
  <script>
    var API = (window.EduAPI && EduAPI.API_BASE) || (localStorage.getItem('edulearn_api') || '/backend-api');
    var user = EduAPI.requireAuth();
    var ALL = [];
    var subjectFilter = 'all';
    var searchQ = '';
    var view = localStorage.getItem('edulearn_videos_view') || 'rows';

    // --- DEMO / reviewer mode -------------------------------------------------
    // A demo account may browse EVERY class (with a Class 6 / Class 7 toggle) so
    // a manager can review both libraries from one login. Real students are NEVER
    // demo, so their strict single-class lock below is untouched.
    var DEMO_EMAILS = ['c7.student.livetest@edulearn.test'];
    var DEMO = !!(user && user.email &&
      (DEMO_EMAILS.indexOf(user.email.toLowerCase()) >= 0 || /demo|reviewer/.test(user.email.toLowerCase())));
    // Which class's library is on screen. For real students this is pinned to
    // their own class; for demo it's toggleable and starts on their class.
    var classFilter = (user && user.className && (String(user.className).match(/\d+/) || [])[0]) || 'all';

    function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
    function fmtDur(s){ if(!s||isNaN(s)) return ''; s=Math.round(s); var m=Math.floor(s/60),x=s%60; return m+':'+(x<10?'0':'')+x; }

    // --- inline line icons (lucide style; stroke is currentColor so each icon
    //     picks up the colour of whatever it sits in) ---
    var ICON = {
      play:    '<polygon points="6 3 20 12 6 21 6 3"/>',
      pause:   '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>',
      volume:  '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>',
      mute:    '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/>',
      check:   '<polyline points="20 6 9 17 4 12"/>',
      chevronLeft:  '<polyline points="15 18 9 12 15 6"/>',
      chevronRight: '<polyline points="9 18 15 12 9 6"/>',
      atom:    '<circle cx="12" cy="12" r="1" fill="currentColor"/><path d="M20.2 20.2c2.04-2.03.02-7.36-4.5-11.9-4.54-4.52-9.87-6.54-11.9-4.5-2.04 2.03-.02 7.36 4.5 11.9 4.54 4.52 9.87 6.54 11.9 4.5Z"/><path d="M15.7 15.7c4.52-4.54 6.54-9.87 4.5-11.9-2.03-2.04-7.36-.02-11.9 4.5-4.52 4.54-6.54 9.87-4.5 11.9 2.03 2.04 7.36.02 11.9-4.5Z"/>',
      ruler:   '<path d="M21.3 15.3a2.4 2.4 0 0 1 0 3.4l-2.6 2.6a2.4 2.4 0 0 1-3.4 0L2.7 8.7a2.41 2.41 0 0 1 0-3.4l2.6-2.6a2.41 2.41 0 0 1 3.4 0Z"/><path d="m14.5 12.5 2-2"/><path d="m11.5 9.5 2-2"/><path d="m8.5 6.5 2-2"/><path d="m17.5 15.5 2-2"/>',
      book:    '<path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/>',
      globe:   '<circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/>',
      clapper: '<path d="M20.2 6 3 11l-.9-2.4c-.3-1.1.3-2.2 1.3-2.5l13.5-4c1.1-.3 2.2.3 2.5 1.3Z"/><path d="m6.2 5.3 3.1 3.9"/><path d="m12.4 3.4 3.1 4"/><path d="M3 11h18v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/>',
      film:    '<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 3v18"/><path d="M3 7.5h4"/><path d="M3 12h18"/><path d="M3 16.5h4"/><path d="M17 3v18"/><path d="M17 7.5h4"/><path d="M17 16.5h4"/>'
    };
    function ico(name, size, extra){
      return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="currentColor"'+
        ' stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"'+(extra||'')+'>'+
        ICON[name]+'</svg>';
    }
    // Subject glyphs are sized by their container's font-size (56px covers,
    // 200px hero, 28px list thumbs), so they render at 1em.
    function glyphIcon(name){ return ico(name, '1em', ' style="display:block"'); }

    // --- per-subject visual identity, derived from the site's aurora palette ---
    var SUBJECTS = {
      'science':  {glyph:glyphIcon('atom'), pip:'#0FA983', grad:'linear-gradient(135deg,#0FA983 0%,#3DE8C5 55%,#7C9BFF 120%)'},
      'maths':    {glyph:glyphIcon('ruler'), pip:'#7C9BFF', grad:'linear-gradient(135deg,#5B6CF0 0%,#7C9BFF 55%,#9FD6FF 120%)'},
      'math':     {glyph:glyphIcon('ruler'), pip:'#7C9BFF', grad:'linear-gradient(135deg,#5B6CF0 0%,#7C9BFF 55%,#9FD6FF 120%)'},
      'english':  {glyph:glyphIcon('book'), pip:'#FFB454', grad:'linear-gradient(135deg,#F0913D 0%,#FFB454 55%,#FFD79A 120%)'},
      'social':   {glyph:glyphIcon('globe'), pip:'#E8746A', grad:'linear-gradient(135deg,#D65A6E 0%,#F08A6A 55%,#FFB454 120%)'},
      'social studies':{glyph:glyphIcon('globe'), pip:'#E8746A', grad:'linear-gradient(135deg,#D65A6E 0%,#F08A6A 55%,#FFB454 120%)'},
      'default':  {glyph:glyphIcon('clapper'), pip:'#7C9BFF', grad:'var(--aurora)'}
    };
    function subjOf(v){
      var k = String(v.subject||'').trim().toLowerCase();
      return SUBJECTS[k] || SUBJECTS[k.split(' ')[0]] || SUBJECTS['default'];
    }

    // --- watched progress (localStorage, per user) ---
    var PKEY = 'edulearn_video_progress_' + (user && user.id ? user.id : 'anon');
    function loadProg(){ try{ return JSON.parse(localStorage.getItem(PKEY)||'{}'); }catch(e){ return {}; } }
    function saveProg(p){ try{ localStorage.setItem(PKEY, JSON.stringify(p)); }catch(e){} }
    var PROG = loadProg();
    function pctOf(id){ var d=PROG[id]; if(!d||!d.dur) return 0; return Math.min(100, Math.round(d.pos/d.dur*100)); }
    function isWatched(id){ return pctOf(id) >= 92; }

    async function load(){
      var sub = document.getElementById('sub');
      document.getElementById('stage').innerHTML =
        '<div class="grid">'+Array(4).fill('<div class="skel"></div>').join('')+'</div>';
      try {
        // A real student is locked to their own class; a demo account (and
        // teachers/parents) may load every class.
        var q = '';
        if (!DEMO && user.role === 'student' && user.className) q = '?className=' + encodeURIComponent(user.className);
        var res = await fetch(API + '/api/videos' + q, { headers:{ 'Authorization':'Bearer '+EduAPI.getToken() }, credentials:'include' });
        // Carry the status on the error object. It used to be flattened into
        // the string 'Server 401', so the catch below could not tell an expired
        // session (401) apart from a genuinely dead server, and reported both
        // as "Is the backend running?".
        if (!res.ok) {
          var httpErr = new Error('Server ' + res.status);
          httpErr.status = res.status;
          throw httpErr;
        }
        var j = await res.json();
        ALL = j.videos || [];
        // Defense-in-depth: a real student never sees videos outside their own
        // class. Skipped for demo so the reviewer can toggle between classes.
        if (!DEMO && user.role === 'student' && user.className){
          var myNum = (String(user.className).match(/\d+/) || [])[0];
          if (myNum) ALL = ALL.filter(function(v){
            var vn = (String(v.className||'').match(/\d+/) || [])[0];
            return vn === myNum;
          });
        }
        if (DEMO){
          sub.innerHTML = '<b>Reviewer mode</b> · toggle a class to see its library'
            + ' · <span style="font-family:\'Fragment Mono\',monospace;font-size:12px">'+ALL.length+' videos across classes</span>';
        } else {
          sub.innerHTML = (user.role==='student'
            ? (user.className ? ('Lectures for <b>'+esc(user.className)+'</b>') : 'All lectures')
            : 'All lectures on the platform')
            + ' · <span style="font-family:\'Fragment Mono\',monospace;font-size:12px">'+ALL.length+' videos</span>';
        }
        buildClassToggle(); buildFilters(); applyView(); render();
      } catch(e){
        document.getElementById('stage').innerHTML='';
        // "Is the backend running?" was wrong for the most common failure.
        // A 401 means the server answered fine and REJECTED THE TOKEN — which
        // happens whenever the session was issued by a different backend than
        // the one being called (the two servers sign with different secrets and
        // use different databases, so their tokens are not interchangeable).
        // Telling the user the server is down sends them to debug the wrong box.
        var box = document.getElementById('errBox');
        var api = (window.EduAPI && EduAPI.API_BASE) || '';
        if (e && e.status === 401){
          box.innerHTML = '<div class="err">Your session is not valid for this server' +
            (api ? ' (' + esc(api) + ')' : '') + '. Sign in again to refresh it. ' +
            '<a href="login.html" style="text-decoration:underline;font-weight:700">Go to login</a></div>';
        } else if (e && e.status){
          box.innerHTML = '<div class="err">The server returned an error (' + e.status + '). ' + esc(e.message) + '</div>';
        } else {
          box.innerHTML = '<div class="err">Could not reach ' + esc(api || 'the server') +
            '. It may be offline, or the browser may have blocked the response (CORS). ' + esc(e.message) + '</div>';
        }
      }
    }

    // Demo-only: a Class 6 / Class 7 (etc.) toggle so a reviewer can switch
    // between class libraries. Each class is its own separate section.
    function buildClassToggle(){
      var host = document.getElementById('classToggle');
      if (!DEMO){ host.style.display = 'none'; return; }
      var nums = Array.from(new Set(ALL.map(function(v){
        return (String(v.className||'').match(/\d+/) || [])[0];
      }).filter(Boolean))).sort(function(a,b){ return (+a)-(+b); });
      if (nums.length < 2){ host.style.display = 'none'; return; } // nothing to toggle
      if (nums.indexOf(classFilter) < 0) classFilter = nums[0];
      host.style.display = '';
      host.innerHTML = nums.map(function(n){
        return '<button class="'+(n===classFilter?'on':'')+'" data-c="'+n+'">Class '+n+'</button>';
      }).join('');
      host.querySelectorAll('button').forEach(function(b){
        b.addEventListener('click', function(){
          host.querySelectorAll('button').forEach(function(x){x.classList.remove('on');});
          b.classList.add('on'); classFilter = b.getAttribute('data-c');
          document.getElementById('search').value=''; searchQ='';
          render();
        });
      });
    }

    function buildFilters(){
      var subjects = ['all'].concat(Array.from(new Set(ALL.map(function(v){return v.subject;}))).filter(Boolean));
      document.getElementById('filters').innerHTML = subjects.map(function(s,i){
        return '<button class="'+(i===0?'on':'')+'" data-s="'+esc(s)+'">'+(s==='all'?'All Subjects':esc(s))+'</button>';
      }).join('');
      document.querySelectorAll('#filters button').forEach(function(b){
        b.addEventListener('click', function(){
          document.querySelectorAll('#filters button').forEach(function(x){x.classList.remove('on');});
          b.classList.add('on'); subjectFilter = b.getAttribute('data-s'); render();
        });
      });
    }

    // A stray test upload ("science" under a bogus "cells" topic) belongs to a
    // different teacher account and can't be removed via the API, so hide it.
    function isJunk(v){
      var t=(v.topic||'').trim().toLowerCase(), ti=(v.title||'').trim().toLowerCase();
      return t==='cells' && ti==='science';
    }
    function visible(){
      return ALL.filter(function(v){
        if (isJunk(v)) return false;
        // Class scope: demo toggles between classes; real students are already
        // class-locked in ALL, so this is a harmless no-op for them.
        if (DEMO && classFilter!=='all'){
          var vn = (String(v.className||'').match(/\d+/) || [])[0];
          if (vn !== classFilter) return false;
        }
        if (subjectFilter!=='all' && v.subject!==subjectFilter) return false;
        if (searchQ){
          var hay = ((v.title||'')+' '+(v.topic||'')+' '+(v.subject||'')).toLowerCase();
          if (hay.indexOf(searchQ)<0) return false;
        }
        return true;
      });
    }

    // Group a list into chapters/topics. Falls back to subject when no topic.
    function groupBy(list, keyFn){
      var order=[], map={};
      list.forEach(function(v){ var k=keyFn(v)||'More lectures'; if(!map[k]){map[k]=[];order.push(k);} map[k].push(v); });
      return order.map(function(k){ return {key:k, items:sortByPart(map[k])}; });
    }
    // A part number embedded in the title ("Part 3 — …") drives ordering + labels.
    function partOf(v){ var m=String(v&&v.title||'').match(/\bpart\s*(\d+)/i); return m?parseInt(m[1],10):null; }
    // The chapter heading + a number badge already convey position, so show the
    // human title without the "Part N — " prefix.
    function cleanTitle(v){ return String(v&&v.title||'').replace(/^\s*part\s*\d+\s*[-–—:.]\s*/i,''); }
    // Ascending by part number; un-numbered lectures keep their original order after.
    function sortByPart(items){
      return items.map(function(v,i){ var p=partOf(v); return {v:v,k:(p!=null?p:1000+i)}; })
                  .sort(function(a,b){ return a.k-b.k; })
                  .map(function(x){ return x.v; });
    }
    // Video topics are stored as curriculum slug-words (so the lesson page can
    // match them); map the known ones to their proper NCERT chapter name for a
    // clean heading. Anything not listed shows its own topic as-is.
    var CHAPTER_DISPLAY = {
      'adolescence': 'Adolescence: A Stage of Growth and Change',
      'metals nonmetals': 'The World of Metals and Non-metals',
      'physical chemical changes': 'Changes Around Us: Physical and Chemical',
      'electricity': 'Electricity: Circuits and their Components',
      'electricity circuits': 'Electricity: Circuits and their Components'
    };
    function chapterName(v){
      var t = (v && v.topic || '').trim();
      return CHAPTER_DISPLAY[t.toLowerCase()] || t || v.subject;
    }

    // ---------- cover card markup ----------
    function coverInner(v, sj, epLabel){
      var pct = pctOf(v.id);
      return '<div class="cover" style="background:'+sj.grad+'">'+
        '<div class="cglyph">'+sj.glyph+'</div>'+
        (epLabel?'<span class="ep">'+esc(epLabel)+'</span>':'')+
        (isWatched(v.id)?'<span class="watched-flag">'+ico('check',16)+'</span>':'')+
        (v.durationLabel?'<span class="dur">'+esc(v.durationLabel)+'</span>':'')+
        '<span class="playbadge">'+ico('play',22)+'</span>'+
        (pct>0&&pct<92?'<div class="prog"><span style="width:'+pct+'%"></span></div>':'')+
      '</div>';
    }
    function cardHTML(v, epLabel){
      var sj = subjOf(v);
      var initial = (v.uploadedByName||'T').trim().charAt(0).toUpperCase();
      var ct = cleanTitle(v);
      return '<div class="vcard" tabindex="0" role="button" data-id="'+v.id+'" data-title="'+esc(ct)+'" aria-label="Play '+esc(ct)+'">'+
        coverInner(v, sj, epLabel)+
        '<div class="vbody">'+
          '<div class="vtitle">'+esc(ct)+'</div>'+
          '<div class="vmeta"><span class="tag">'+esc(v.className)+'</span><span class="tag">'+esc(v.subject)+'</span>'+(v.topic?'<span>'+esc(v.topic)+'</span>':'')+'</div>'+
          '<div class="by"><span class="av">'+esc(initial)+'</span>'+esc(v.uploadedByName||'Teacher')+' · '+(v.views||0)+' views</div>'+
        '</div></div>';
    }

    // ---------- render dispatch ----------
    function render(){
      var stage = document.getElementById('stage');
      var list = visible();
      if (!list.length){
        stage.innerHTML = '<div class="empty"><div class="big">'+ico('film',44)+'</div>'+
          (searchQ ? 'No lectures match “'+esc(searchQ)+'”.' : 'No lectures here yet.')+
          (user.role==='teacher' ? ' <a href="upload.html">Upload one →</a>' : '')+'</div>';
        return;
      }
      if (view==='list') return renderList(stage, list);
      if (view==='grid') return renderGrid(stage, list);
      return renderRows(stage, list);
    }

    function renderGrid(stage, list){
      stage.innerHTML = '<div class="grid">'+list.map(function(v){return cardHTML(v);}).join('')+'</div>';
      wireCards();
    }

    function renderRows(stage, list){
      // Featured = most-viewed (ties → first). Rest grouped by topic/chapter.
      var featured = list.slice().sort(function(a,b){return (b.views||0)-(a.views||0);})[0];
      var groups = groupBy(list, function(v){ return chapterName(v); });
      var html = heroHTML(featured);
      groups.forEach(function(g, gi){
        var sj = subjOf(g.items[0]);
        html += '<section class="shelf">'+
          '<div class="shelf-head"><div class="shelf-title"><span class="pip" style="background:'+sj.pip+'"></span>'+esc(g.key)+'</div>'+
          '<span class="shelf-count">'+g.items.length+' '+(g.items.length===1?'lecture':'lectures')+'</span></div>'+
          '<div class="rail-outer"><button class="rail-btn prev" data-rail="'+gi+'" data-dir="-1" aria-label="Scroll left">'+ico('chevronLeft',18)+'</button>'+
          '<div class="rail" id="rail'+gi+'">'+
            g.items.map(function(v,i){ return cardHTML(v, 'Part '+(partOf(v)||(i+1))); }).join('')+
          '</div>'+
          '<button class="rail-btn next" data-rail="'+gi+'" data-dir="1" aria-label="Scroll right">'+ico('chevronRight',18)+'</button></div>'+
        '</section>';
      });
      stage.innerHTML = html;
      wireCards(); wireRails(); wireHero(featured);
    }

    function heroHTML(v){
      if(!v) return '';
      var sj = subjOf(v);
      return '<div class="hero" id="heroCard" tabindex="0" role="button" aria-label="Play '+esc(cleanTitle(v))+'">'+
        '<div class="hero-art" style="background:'+sj.grad+'"></div>'+
        '<div class="hero-glyph">'+sj.glyph+'</div>'+
        '<div class="scrim"></div>'+
        '<div class="hero-inner">'+
          '<div class="hero-eyebrow"><span class="dot"></span>Featured · '+esc(v.subject||'Lecture')+'</div>'+
          '<h2>'+esc(cleanTitle(v))+'</h2>'+
          '<p>'+esc(v.description || (v.topic? (v.topic+' — start watching now.') : 'Tap to start watching this lecture.'))+'</p>'+
          '<div><span class="hero-cta">'+ico('play',16)+'Play now</span>'+
          '<span class="hero-meta"><span>'+esc(v.className)+'</span><span>'+(v.views||0)+' views</span>'+(v.durationLabel?'<span>'+esc(v.durationLabel)+'</span>':'')+'</span></div>'+
        '</div></div>';
    }

    function renderList(stage, list){
      var groups = groupBy(list, function(v){ return chapterName(v); });
      var html = '';
      groups.forEach(function(g){
        var sj = subjOf(g.items[0]);
        html += '<div class="listwrap" style="margin-bottom:20px">'+
          '<div class="lgroup-head"><span class="pip" style="background:'+sj.pip+'"></span><b>'+esc(g.key)+'</b><span class="c">'+g.items.length+' videos</span></div>'+
          g.items.map(function(v,i){
            var s2 = subjOf(v); var pct=pctOf(v.id); var ct=cleanTitle(v);
            return '<div class="lrow" tabindex="0" role="button" data-id="'+v.id+'" data-title="'+esc(ct)+'" aria-label="Play '+esc(ct)+'">'+
              '<span class="lnum">'+(partOf(v)||(i+1))+'</span>'+
              '<div class="lthumb" style="background:'+s2.grad+'"><span class="cglyph">'+s2.glyph+'</span>'+
                (pct>0&&pct<92?'<div class="prog"><span style="width:'+pct+'%"></span></div>':'')+'</div>'+
              '<div class="linfo"><div class="t">'+esc(ct)+(isWatched(v.id)?' <span style="color:var(--teal);vertical-align:-2px">'+ico('check',14)+'</span>':'')+'</div>'+
                '<div class="m"><span class="tag">'+esc(v.subject)+'</span><span>'+esc(v.uploadedByName||'Teacher')+'</span><span>'+(v.views||0)+' views</span></div></div>'+
              (v.durationLabel?'<span class="ldur">'+esc(v.durationLabel)+'</span>':'')+
              '<span class="lplay">'+ico('play',18)+'</span>'+
            '</div>';
          }).join('')+
        '</div>';
      });
      stage.innerHTML = html;
      wireCards();
    }

    // ---------- wiring ----------
    function wireCards(){
      document.querySelectorAll('.vcard,.lrow').forEach(function(c){
        var go = function(){ play(c.getAttribute('data-id'), c.getAttribute('data-title')); };
        c.addEventListener('click', go);
        c.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); go(); } });
      });
    }
    function wireHero(v){
      var h=document.getElementById('heroCard'); if(!h||!v) return;
      var go=function(){ play(v.id, v.title); };
      h.addEventListener('click', go);
      h.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); go(); } });
    }
    function wireRails(){
      document.querySelectorAll('.rail-btn').forEach(function(b){
        b.addEventListener('click', function(){
          var rail=document.getElementById('rail'+b.getAttribute('data-rail'));
          if(rail) rail.scrollBy({left: parseInt(b.getAttribute('data-dir'))*rail.clientWidth*0.85, behavior:'smooth'});
        });
      });
    }

    // ---------- view toggle ----------
    function applyView(){
      document.getElementById('viewRows').classList.toggle('on', view==='rows');
      document.getElementById('viewGrid').classList.toggle('on', view==='grid');
      document.getElementById('viewList').classList.toggle('on', view==='list');
    }
    function setView(v){ view=v; localStorage.setItem('edulearn_videos_view', v); applyView(); render(); }
    document.getElementById('viewRows').addEventListener('click', function(){ setView('rows'); });
    document.getElementById('viewGrid').addEventListener('click', function(){ setView('grid'); });
    document.getElementById('viewList').addEventListener('click', function(){ setView('list'); });

    // ---------- search ----------
    var st;
    document.getElementById('search').addEventListener('input', function(){
      var val=this.value.trim().toLowerCase();
      clearTimeout(st); st=setTimeout(function(){ searchQ=val; render(); }, 160);
    });

    // ---------- player ----------
    var modal = document.getElementById('modal');
    var player = document.getElementById('player');
    var wrap = document.getElementById('vidwrap');
    var seek = document.getElementById('seek');
    var btnPlay = document.getElementById('btnPlay');
    var fmtT = fmtDur;
    var curId = null;

    function play(id, title){
      curId = id;
      document.getElementById('playerTitle').textContent = title;
      player.src = API + '/api/videos/' + id + '/stream?token=' + encodeURIComponent(EduAPI.getToken());
      modal.classList.add('open');
      // resume where they left off
      var saved = PROG[id];
      player.addEventListener('loadedmetadata', function once(){
        player.removeEventListener('loadedmetadata', once);
        if (saved && saved.pos && saved.pos < (player.duration||0)-2) player.currentTime = saved.pos;
      });
      player.play().catch(function(){});
      EduAPI.recordVideoView(id);
    }
    function closePlayer(){
      persist();
      player.pause(); player.removeAttribute('src'); player.load();
      modal.classList.remove('open'); curId=null;
    }
    function persist(){
      if(curId && player.duration){ PROG[curId]={pos:player.currentTime, dur:player.duration, t:Date.now()}; saveProg(PROG); }
    }
    function togglePlay(){ if (player.paused) player.play(); else player.pause(); }
    function skip(sec){ player.currentTime = Math.min(Math.max(0,(player.currentTime||0)+sec), player.duration||0); }

    player.addEventListener('play', function(){ btnPlay.innerHTML=ico('pause',20); wrap.classList.remove('paused'); });
    player.addEventListener('pause', function(){ btnPlay.innerHTML=ico('play',20); wrap.classList.add('paused'); persist(); });
    player.addEventListener('ended', function(){ persist(); });
    player.addEventListener('timeupdate', function(){
      if (player.duration){ seek.value = (player.currentTime/player.duration)*100; }
      document.getElementById('time').textContent = fmtT(player.currentTime)+' / '+fmtT(player.duration);
    });
    seek.addEventListener('input', function(){ if (player.duration) player.currentTime = (seek.value/100)*player.duration; });

    btnPlay.addEventListener('click', togglePlay);
    player.addEventListener('click', togglePlay);
    document.getElementById('centerPlay').addEventListener('click', togglePlay);
    document.getElementById('btnBack').addEventListener('click', function(){ skip(-10); });
    document.getElementById('btnFwd').addEventListener('click', function(){ skip(10); });
    document.getElementById('speed').addEventListener('change', function(){ player.playbackRate = parseFloat(this.value); });
    var vol = document.getElementById('volume'), btnMute = document.getElementById('btnMute');
    vol.addEventListener('input', function(){ player.volume = parseFloat(vol.value); player.muted = (vol.value==0); btnMute.innerHTML = ico(vol.value==0?'mute':'volume',20); });
    btnMute.addEventListener('click', function(){ player.muted = !player.muted; btnMute.innerHTML = ico(player.muted?'mute':'volume',20); vol.value = player.muted?0:player.volume; });
    document.getElementById('btnFull').addEventListener('click', function(){
      if (document.fullscreenElement) document.exitFullscreen();
      else wrap.requestFullscreen && wrap.requestFullscreen();
    });

    document.addEventListener('keydown', function(e){
      if (!modal.classList.contains('open')) return;
      if (e.key===' '){ e.preventDefault(); togglePlay(); }
      else if (e.key==='ArrowLeft'){ skip(-10); }
      else if (e.key==='ArrowRight'){ skip(10); }
      else if (e.key.toLowerCase()==='f'){ document.getElementById('btnFull').click(); }
      else if (e.key.toLowerCase()==='m'){ btnMute.click(); }
      else if (e.key==='Escape' && !document.fullscreenElement){ closePlayer(); }
    });
    // save progress if they close the tab mid-video
    window.addEventListener('beforeunload', persist);

    document.getElementById('closePlayer').addEventListener('click', closePlayer);
    modal.addEventListener('click', function(e){ if (e.target.id==='modal') closePlayer(); });

    applyView();
    load();
  </script>
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <linearGradient id="auroraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A88F"/>
      <stop offset="48%" stop-color="#3F5BE0"/>
      <stop offset="100%" stop-color="#C99A2E"/>
    </linearGradient>
  </defs>
</svg>
