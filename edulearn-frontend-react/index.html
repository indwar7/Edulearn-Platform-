<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduLearn · Learn Smart, Score Better</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Swapped per route by usePageChrome(); see src/lib/pageFonts.ts.
         The pages do not all request the same Fraunces weights. -->
    <link id="page-fonts" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Nunito:wght@400;500;600;700;800;900&family=Fragment+Mono:ital@0;1&display=swap" rel="stylesheet" />

    <!--
      Stylesheet order is load-bearing. It mirrors the static site exactly:

        theme.css  ->  the active page's own CSS  ->  vivid.css

      vivid.css is last so its platform-wide overrides win by source order,
      which is how it was authored. #page-css is the swap slot: each route
      writes its lifted stylesheet there via usePageCss(). Do not reorder,
      and do not import global CSS from JS — Vite would append it after
      vivid.css and quietly outrank the theme.
    -->
    <link id="theme-css" rel="stylesheet" href="/theme.css" />
    <style id="page-css"></style>
    <link rel="stylesheet" href="/vivid.css" />

    <style>
      /*
        #root must not introduce a box between <body> and the page content.
        The lifted stylesheets set heights, flex and grid layouts directly on
        body — as they could, when the markup was body's direct children — and
        an extra wrapper breaks those chains. The visible symptom is the page
        background stopping at content height instead of filling the viewport.
        display:contents removes the wrapper from layout while keeping it as
        React's mount point.
      */
      #root { display: contents; }
    </style>

    <!-- Per-route chrome corrections; see usePageChrome(). Last so it wins. -->
    <style id="chrome-css"></style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!--
      Shared page scripts, carried over from the static site where every page
      loaded them. Both are self-contained DOM scripts that append themselves
      to <body> once, so they survive client-side route changes the same way
      they existed on every page before. The .html links features-panel.js
      builds are translated by useLegacyLinks().
    -->
    <script defer src="/curriculum.js"></script>
    <script defer src="/theme.js"></script>
    <script defer src="/account-menu.js"></script>
    <script defer src="/features-panel.js"></script>
  </body>
</html>
