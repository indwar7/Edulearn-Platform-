<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — EduLearn · Start Learning Today</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Schibsted+Grotesk:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
  <style>
    :root{
      --teal:#3DE8C5;
      --peri:#7C9BFF;
      --amber:#FFB454;
      --rose:#FF7AA2;
      --aurora:linear-gradient(115deg,#3DE8C5 0%,#7C9BFF 48%,#FFB454 100%);
      --ease:cubic-bezier(.22,1,.36,1);
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      background:#FFFFFF;
      color:#1A1F36;
      font-family:'Schibsted Grotesk',sans-serif;
      font-size:16px;
      line-height:1.55;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow-x:hidden;
    }

    /* Animated gradient background */
    .bg-elements{
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
      overflow:hidden;
    }

    .gradient-orb{
      position:absolute;
      border-radius:50%;
      filter:blur(80px);
      opacity:.15;
      animation:float 15s ease-in-out infinite alternate;
    }

    .orb-1{
      width:300px;
      height:300px;
      background:linear-gradient(135deg, #3DE8C5, transparent);
      top:-100px;
      left:-100px;
    }

    .orb-2{
      width:250px;
      height:250px;
      background:linear-gradient(135deg, #7C9BFF, transparent);
      bottom:-50px;
      right:-50px;
      animation-delay:3s;
    }

    .orb-3{
      width:200px;
      height:200px;
      background:linear-gradient(135deg, #FFB454, transparent);
      top:50%;
      right:-80px;
      animation-delay:6s;
    }

    @keyframes float{
      from{transform:translate(0,0) scale(1)}
      to{transform:translate(30px,-30px) scale(1.1)}
    }

    .container{
      position:relative;
      z-index:10;
      width:100%;
      max-width:420px;
      padding:40px 30px;
      background:rgba(255,255,255,0.95);
      backdrop-filter:blur(10px);
      border:1px solid rgba(0,0,0,.08);
      border-radius:20px;
      box-shadow:0 20px 60px rgba(0,0,0,.08);
    }

    .logo{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:32px;
      justify-content:center;
    }

    .logo-mark{
      width:40px;
      height:40px;
    }

    .logo-text{
      font-family:'Fraunces',serif;
      font-size:24px;
      font-weight:600;
      background:var(--aurora);
      -webkit-background-clip:text;
      background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    h1{
      font-family:'Fraunces',serif;
      font-size:32px;
      font-weight:600;
      margin-bottom:12px;
      text-align:center;
      letter-spacing:-.01em;
    }

    .subtitle{
      text-align:center;
      color:#6B7280;
      margin-bottom:32px;
      font-size:15px;
    }

    .form-group{
      margin-bottom:20px;
    }

    label{
      display:block;
      font-size:14px;
      font-weight:600;
      margin-bottom:8px;
      color:#1A1F36;
    }

    input[type="email"],
    input[type="password"]{
      width:100%;
      padding:12px 16px;
      border:1.5px solid rgba(0,0,0,.1);
      border-radius:12px;
      font-family:inherit;
      font-size:15px;
      color:#1A1F36;
      background:#FAFBFC;
      transition:all .3s var(--ease);
    }

    input[type="email"]:focus,
    input[type="password"]:focus{
      outline:none;
      border-color:var(--teal);
      background:#FFFFFF;
      box-shadow:0 0 0 4px rgba(61,232,197,.1);
    }

    input::placeholder{
      color:#9CA3AF;
    }

    .forgot-password{
      text-align:right;
      margin-bottom:24px;
    }

    .forgot-password a{
      font-size:14px;
      color:var(--teal);
      text-decoration:none;
      transition:opacity .3s var(--ease);
    }

    .forgot-password a:hover{
      opacity:.7;
    }

    .btn{
      width:100%;
      padding:14px 20px;
      border:none;
      border-radius:12px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      transition:all .4s var(--ease);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
    }

    .btn-primary{
      background:var(--aurora);
      color:white;
      box-shadow:0 10px 30px rgba(61,232,197,.3);
    }

    .btn-primary:hover{
      transform:translateY(-2px);
      box-shadow:0 16px 40px rgba(61,232,197,.4);
    }

    .btn-primary:active{
      transform:translateY(0);
    }

    .divider{
      display:flex;
      align-items:center;
      gap:12px;
      margin:28px 0;
      color:#D1D5DB;
      font-size:14px;
    }

    .divider::before,
    .divider::after{
      content:'';
      flex:1;
      height:1px;
      background:rgba(0,0,0,.08);
    }

    .social-logins{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:24px;
    }

    .social-btn{
      padding:12px 16px;
      border:1.5px solid rgba(0,0,0,.1);
      background:#FAFBFC;
      border-radius:12px;
      font-size:14px;
      font-weight:600;
      cursor:pointer;
      transition:all .3s var(--ease);
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    .social-btn:hover{
      border-color:rgba(0,0,0,.2);
      background:#FFFFFF;
      transform:translateY(-2px);
    }

    .signup-link{
      text-align:center;
      font-size:14px;
      color:#6B7280;
    }

    .signup-link a{
      color:var(--teal);
      font-weight:700;
      text-decoration:none;
      transition:opacity .3s var(--ease);
    }

    .signup-link a:hover{
      opacity:.7;
    }

    .demo-badge{
      display:inline-block;
      background:#F0FFFE;
      border:1px solid var(--teal);
      color:var(--teal);
      padding:6px 12px;
      border-radius:20px;
      font-size:12px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.05em;
      margin-bottom:20px;
      text-align:center;
      width:100%;
    }

    .demo-info{
      background:#F0FFFE;
      border-left:3px solid var(--teal);
      padding:12px;
      border-radius:8px;
      font-size:13px;
      color:#1A1F36;
      margin-bottom:20px;
    }

    .demo-info strong{
      color:var(--teal);
    }

    @media (max-width:480px){
      .container{
        border-radius:16px;
        padding:30px 20px;
      }
      h1{font-size:26px}
      .social-logins{grid-template-columns:1fr}
    }

    /* Dark mode overrides */
    html.dark-mode body {
      background: #0F172A;
      color: #F5F7FA;
    }

    html.dark-mode .container {
      background: rgba(30, 41, 59, 0.8);
      border-color: rgba(255, 255, 255, 0.1);
    }

    html.dark-mode input {
      background: rgba(255, 255, 255, 0.03);
      border-color: rgba(255, 255, 255, 0.1);
      color: #F5F7FA;
    }

    html.dark-mode input::placeholder {
      color: #CBD5E1;
    }

    html.dark-mode .subtitle {
      color: #CBD5E1;
    }

    html.dark-mode [data-theme-toggle] {
      color: #F5F7FA;
    }
  </style>
  <link rel="stylesheet" href="../theme.css">
</head>
<body>

  <button data-theme-toggle>Dark</button>

  <div class="bg-elements">
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>
    <div class="gradient-orb orb-3"></div>
  </div>

  <div class="container">
    <div class="logo">
      <svg class="logo-mark" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 1.5 L14.6 9.4 L22.5 12 L14.6 14.6 L12 22.5 L9.4 14.6 L1.5 12 L9.4 9.4 Z" fill="url(#auroraGrad)"/>
      </svg>
      <svg width="0" height="0" style="position:absolute">
        <defs>
          <linearGradient id="auroraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3DE8C5"/>
            <stop offset="48%" stop-color="#7C9BFF"/>
            <stop offset="100%" stop-color="#FFB454"/>
          </linearGradient>
        </defs>
      </svg>
      <span class="logo-text">EduLearn</span>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Continue your learning journey</p>

    <div class="demo-badge">Demo Mode</div>
    <div class="demo-info">
      <strong>Try it now:</strong><br/>
      Email: student@edulearn.com<br/>
      Pass: Demo@2024
    </div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required value="student@edulearn.com">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required value="Demo@2024">
      </div>

      <div class="forgot-password">
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary">
        <span>Sign In</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>

      <div class="divider">or continue with</div>

      <div class="social-logins">
        <button type="button" class="social-btn" onclick="handleSocial('google')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Google
        </button>
        <button type="button" class="social-btn" onclick="handleSocial('apple')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 13.5c-.91 2.13-.505 4.26 1.75 5.59.94.565 2.05.96 3.25 1.12-.15 1.17-.915 2.08-1.915 2.38-1.94.585-4.42.19-6.64-1.05-.68-.37-1.28-.86-1.81-1.41-.53.55-1.13 1.04-1.81 1.41-2.22 1.24-4.7 1.635-6.64 1.05-1-.3-1.765-1.21-1.915-2.38 1.2-.16 2.31-.555 3.25-1.12 2.255-1.33 2.66-3.46 1.75-5.59-1.755-4.18-7.805-5.06-7.805-5.06 0-.39.04-.78.11-1.16 6.265-.365 8.715 2.645 10.985 4.47 2.27-1.825 4.72-4.835 10.985-4.47.07.38.11.77.11 1.16 0 0-6.05.88-7.805 5.06z"/></svg>
          Apple
        </button>
      </div>
    </form>

    <p class="signup-link">
      Don't have an account? <a href="signup.html">Sign up for free</a>
    </p>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // Demo: simple validation
      if(email === 'student@edulearn.com' && password === 'Demo@2024') {
        localStorage.setItem('edulearn_user', JSON.stringify({
          email,
          name: 'Demo Student',
          loginTime: new Date().toISOString()
        }));
        alert('Login successful! Redirecting to dashboard...');
        setTimeout(() => window.location.href = 'learn.html', 500);
      } else {
        alert('Invalid credentials.\n\nDemo: student@edulearn.com / Demo@2024');
      }
    }

    function handleSocial(provider) {
      alert(`${provider.toUpperCase()} login coming soon!\n\nFor now, use the demo credentials to explore.`);
    }
  </script>

  <script src="../theme.js"></script>
<script src="../features-panel.js"></script>
</body>
</html>
