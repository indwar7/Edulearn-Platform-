<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Video — EduLearn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,480&family=Schibsted+Grotesk:wght@400;500;600;700&family=Fragment+Mono&display=swap" rel="stylesheet">
  <style>
    :root{
      --ink:#1A1F36;--bg:#F7F9FC;--card:#FFFFFF;--muted:#6B7280;--bg2:#F5F7FA;
      --line:rgba(15,23,42,.10);--teal:#0FA983;
      --aurora:linear-gradient(115deg,#3DE8C5 0%,#7C9BFF 48%,#FFB454 100%);
      --ease:cubic-bezier(.22,1,.36,1);--shadow:0 18px 44px rgba(15,23,42,.10);
    }
    *{box-sizing:border-box;}
    body{margin:0;font-family:'Schibsted Grotesk',system-ui,sans-serif;background:var(--bg);color:var(--ink);}
    .wrap{max-width:640px;margin:0 auto;padding:40px 24px 60px;}
    h1{font-family:'Fraunces',serif;font-weight:480;font-size:32px;margin:0 0 6px;}
    h1 em{font-style:italic;background:var(--aurora);-webkit-background-clip:text;background-clip:text;color:transparent;}
    .sub{color:var(--muted);font-size:14px;margin:0 0 26px;}
    .card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:28px;}
    label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px;font-weight:600;}
    input,select,textarea{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--line);background:var(--bg2);color:var(--ink);font-size:14px;font-family:inherit;margin-bottom:16px;transition:border-color .2s,box-shadow .2s;}
    input:focus,select:focus,textarea:focus{outline:none;border-color:#3DE8C5;box-shadow:0 0 0 3px rgba(61,232,197,.15);}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .drop{border:2px dashed var(--line);border-radius:16px;padding:30px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:16px;}
    .drop:hover,.drop.over{border-color:#3DE8C5;background:rgba(61,232,197,.05);}
    .drop .ico{font-size:34px;}
    .drop .t{font-weight:600;margin-top:8px;}
    .drop .s{font-size:12px;color:var(--muted);margin-top:4px;}
    .file-name{font-size:13px;color:var(--teal);font-weight:600;margin-top:8px;}
    .btn{width:100%;border:none;border-radius:12px;background:var(--aurora);color:#0B1224;font-weight:700;font-size:16px;padding:14px;cursor:pointer;transition:transform .2s,box-shadow .2s;}
    .btn:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(61,232,197,.3);}
    .btn:disabled{opacity:.6;cursor:default;transform:none;box-shadow:none;}
    .msg{margin-top:14px;padding:12px 14px;border-radius:11px;font-size:14px;display:none;}
    .msg.ok{background:rgba(15,169,131,.1);color:#0FA983;display:block;}
    .msg.err{background:rgba(226,76,77,.1);color:#C2181C;display:block;}
    .bar{height:8px;background:var(--bg2);border-radius:999px;overflow:hidden;margin-top:14px;display:none;}
    .bar span{display:block;height:100%;width:0;background:var(--aurora);transition:width .2s;}
    .links{margin-top:18px;font-size:14px;}
    .links a{color:var(--teal);text-decoration:none;font-weight:600;}
    .gate{text-align:center;padding:60px 20px;color:var(--muted);}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Upload <em>Video Lecture</em></h1>
    <p class="sub">Teachers & admins — add an animated lecture for a class & subject.</p>

    <div id="gate" class="gate" style="display:none">
      You must be logged in as a <b>teacher</b> to upload. <a href="login.html">Login</a>
    </div>

    <div class="card" id="form">
      <label>Video Title *</label>
      <input id="title" placeholder="Numericals — Whole Numbers">

      <div class="row">
        <div>
          <label>Class *</label>
          <select id="className">
            <option>Class 6</option><option>Class 7</option>
            <option>Class 8</option><option>Class 9</option>
          </select>
        </div>
        <div>
          <label>Subject *</label>
          <select id="subject">
            <option>Maths</option><option>Science</option>
            <option>English</option><option>Social Studies</option>
          </select>
        </div>
      </div>

      <label>Topic</label>
      <input id="topic" placeholder="Numericals">

      <label>Description</label>
      <textarea id="description" rows="2" placeholder="What this lecture covers…"></textarea>

      <label>Video File *</label>
      <div class="drop" id="drop">
        <div class="ico">🎬</div>
        <div class="t">Click or drop a video here</div>
        <div class="s">MP4, up to 500 MB</div>
        <div class="file-name" id="fileName"></div>
      </div>
      <input type="file" id="file" accept="video/*" style="display:none">

      <div class="bar" id="bar"><span id="barFill"></span></div>
      <button class="btn" id="submit">Upload Lecture</button>
      <div class="msg" id="msg"></div>

      <div class="links">
        <a href="videos.html">→ View video library</a> &nbsp;·&nbsp;
        <a href="dashboard.html">Dashboard</a>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    var API = (localStorage.getItem('edulearn_api') || 'http://localhost:4000');
    var user = EduAPI.getUser();
    // Only teachers (admin role-as-teacher) may upload.
    if (!user || user.role !== 'teacher') {
      document.getElementById('form').style.display = 'none';
      document.getElementById('gate').style.display = 'block';
    }

    var fileInput = document.getElementById('file');
    var drop = document.getElementById('drop');
    drop.addEventListener('click', function(){ fileInput.click(); });
    fileInput.addEventListener('change', function(){
      if (fileInput.files[0]) document.getElementById('fileName').textContent = '✓ ' + fileInput.files[0].name;
    });
    ['dragover','dragenter'].forEach(function(e){ drop.addEventListener(e, function(ev){ ev.preventDefault(); drop.classList.add('over'); }); });
    ['dragleave','drop'].forEach(function(e){ drop.addEventListener(e, function(ev){ ev.preventDefault(); drop.classList.remove('over'); }); });
    drop.addEventListener('drop', function(ev){
      if (ev.dataTransfer.files[0]){ fileInput.files = ev.dataTransfer.files; document.getElementById('fileName').textContent = '✓ ' + ev.dataTransfer.files[0].name; }
    });

    function msg(text, ok){ var m = document.getElementById('msg'); m.textContent = text; m.className = 'msg ' + (ok?'ok':'err'); }

    document.getElementById('submit').addEventListener('click', function(){
      var title = document.getElementById('title').value.trim();
      var file = fileInput.files[0];
      if (!title){ msg('Please enter a title.', false); return; }
      if (!file){ msg('Please choose a video file.', false); return; }

      var fd = new FormData();
      fd.append('title', title);
      fd.append('className', document.getElementById('className').value);
      fd.append('subject', document.getElementById('subject').value);
      fd.append('topic', document.getElementById('topic').value.trim());
      fd.append('description', document.getElementById('description').value.trim());
      fd.append('uploaderName', user.name || '');
      fd.append('video', file);

      var btn = document.getElementById('submit'); btn.disabled = true; btn.textContent = 'Uploading…';
      var bar = document.getElementById('bar'); bar.style.display = 'block';
      var fill = document.getElementById('barFill');

      // XHR for real upload progress.
      var xhr = new XMLHttpRequest();
      xhr.open('POST', API + '/api/videos');
      xhr.setRequestHeader('Authorization', 'Bearer ' + EduAPI.getToken());
      xhr.upload.onprogress = function(e){ if (e.lengthComputable) fill.style.width = Math.round(e.loaded/e.total*100) + '%'; };
      xhr.onload = function(){
        btn.disabled = false; btn.textContent = 'Upload Lecture';
        if (xhr.status === 201){
          msg('✓ Uploaded! Students in this class can now watch it.', true);
          document.getElementById('title').value=''; document.getElementById('fileName').textContent=''; fileInput.value='';
          setTimeout(function(){ fill.style.width='0'; bar.style.display='none'; }, 1200);
        } else {
          try { msg(JSON.parse(xhr.responseText).error || 'Upload failed', false); } catch(e){ msg('Upload failed ('+xhr.status+')', false); }
        }
      };
      xhr.onerror = function(){ btn.disabled=false; btn.textContent='Upload Lecture'; msg('Cannot reach server. Is the backend running?', false); };
      xhr.send(fd);
    });
  </script>
</body>
</html>
