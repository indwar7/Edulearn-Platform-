<html lang="en">
<head>

<title>PAL AI — EduLearn</title>
<meta name="description" content="PAL is EduLearn's AI tutor. Students ask doubts, parents ask about progress, teachers generate worksheets — all in one chat.">

<style>
:root{
  --ink:#FFFFFF; --card:#FFFFFF; --card2:#F5F7FA;
  --line:rgba(0,0,0,.08); --cream:#1A1F36; --muted:#6B7280;
  --teal:#3DE8C5; --peri:#7C9BFF; --amber:#FFB454; --rose:#FF7AA2;
  --aurora:linear-gradient(115deg,#3DE8C5 0%,#7C9BFF 48%,#FFB454 100%);
  --ease:cubic-bezier(.22,1,.36,1);
  --on-accent:#0B1224; --line-strong:rgba(15,23,42,.18);
  --navbg:rgba(255,255,255,.95); --shadow-soft:0 16px 44px rgba(15,23,42,.10);
}
html.dark-mode{
  --ink:#0F172A; --card:#1a2847; --card2:#253556;
  --line:rgba(255,255,255,.1); --cream:#F5F7FA; --muted:#CBD5E1;
  --line-strong:rgba(255,255,255,.22); --navbg:rgba(15,23,42,.95);
  --shadow-soft:0 16px 44px rgba(0,0,0,.45);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--ink);color:var(--cream);font-family:'Schibsted Grotesk',sans-serif;font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;overflow:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
.mono{font-family:'Fragment Mono',monospace;text-transform:uppercase;letter-spacing:.12em;font-size:11px;color:var(--muted)}

.nav{flex:none;position:sticky;top:0;z-index:80;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:var(--navbg);border-bottom:1px solid var(--line)}
.nav__inner{max-width:1500px;margin:0 auto;padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.brand{display:flex;align-items:center;gap:10px}
.brand__word{font-family:'Fraunces',serif;font-weight:600;font-size:21px}
.nav__links{display:flex;gap:26px}
.nav__link{font-size:14px;font-weight:500;color:var(--muted);position:relative;transition:color .3s var(--ease)}
.nav__link:hover,.nav__link.is-current{color:var(--cream)}
.nav__link.is-current::after{content:"";position:absolute;left:50%;bottom:-6px;width:18px;height:3px;border-radius:3px;transform:translateX(-50%);background:var(--aurora)}
.nav__right{display:flex;align-items:center;gap:10px}
.nav .nav__theme{height:32px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:999px;padding:5px 11px;background:transparent;color:var(--cream)}

/* ============ app shell ============ */
.app{flex:1;display:grid;grid-template-columns:300px minmax(0,1fr);min-height:0;max-width:1500px;width:100%;margin:0 auto}

/* sidebar */
.side{border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0;padding:18px 16px;gap:14px;background:var(--ink)}
.roles{display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--card2);border:1px solid var(--line);border-radius:13px;padding:4px;gap:4px}
.role{font-size:12.5px;font-weight:700;padding:8px 4px;border-radius:9px;color:var(--muted);text-align:center;transition:all .25s var(--ease)}
.role.is-on{background:var(--card);color:var(--cream);box-shadow:0 4px 14px rgba(15,23,42,.08)}
.role.is-on.r-student{color:#0A9F7B}
.role.is-on.r-parent{color:#C77B14}
.role.is-on.r-teacher{color:#4C6FFF}
html.dark-mode .role.is-on.r-student{color:var(--teal)}
html.dark-mode .role.is-on.r-parent{color:var(--amber)}
html.dark-mode .role.is-on.r-teacher{color:var(--peri)}
.btn-new{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--aurora);color:var(--on-accent);
  font-weight:700;font-size:14px;padding:11px;border-radius:13px;
  box-shadow:0 8px 26px rgba(61,232,197,.3);
  transition:transform .3s var(--ease);
}
.btn-new:hover{transform:translateY(-1px)}
.side__label{margin-top:4px}
.chatlist{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;min-height:0;margin:0 -6px;padding:0 6px}
.chatitem{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:11px;font-size:13.5px;color:var(--muted);text-align:left;transition:background .2s var(--ease),color .2s var(--ease);overflow:hidden}
.chatitem:hover{background:var(--card2);color:var(--cream)}
.chatitem.is-on{background:var(--card2);color:var(--cream);font-weight:600}
.chatitem .t{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.chatitem .rb{width:7px;height:7px;border-radius:50%;flex:none}
.side__foot{font-size:11.5px;color:var(--muted);line-height:1.5;border-top:1px solid var(--line);padding-top:12px}

/* chat pane */
.pane{display:flex;flex-direction:column;min-height:0;min-width:0}
.pane__head{flex:none;display:flex;align-items:center;gap:12px;padding:14px 28px;border-bottom:1px solid var(--line)}
.pane__title{font-family:'Fraunces',serif;font-weight:600;font-size:19px}
.rolebadge{font-family:'Fragment Mono',monospace;font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;border-radius:999px;padding:4px 12px;color:var(--on-accent);font-weight:700}
.pane__hint{margin-left:auto;font-size:12px;color:var(--muted)}

.thread{flex:1;overflow-y:auto;min-height:0;padding:28px;scroll-behavior:smooth}
.thread__inner{max-width:780px;margin:0 auto;display:flex;flex-direction:column;gap:20px}

/* welcome */
.welcome{text-align:center;padding:34px 10px 8px}
.welcome .tokky{animation:tokFloat 3.4s ease-in-out infinite alternate}
@keyframes tokFloat{from{transform:translateY(0)}to{transform:translateY(-8px)}}
.welcome .blink{transform-box:fill-box;transform-origin:center;animation:blink 4.4s infinite}
@keyframes blink{0%,92%,100%{transform:scaleY(1)}95%,97%{transform:scaleY(.1)}}
.welcome h2{font-family:'Fraunces',serif;font-weight:500;font-size:clamp(26px,3.4vw,40px);letter-spacing:-.02em;line-height:1.12;margin:18px 0 8px}
.welcome h2 em{font-style:italic;font-weight:600;background:var(--aurora);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.welcome p{color:var(--muted);font-size:15px;max-width:430px;margin:0 auto}
.starters{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:26px;text-align:left}
.starter{border:1px solid var(--line);background:var(--card);border-radius:15px;padding:13px 16px;font-size:13.5px;font-weight:500;color:var(--cream);transition:all .3s var(--ease);text-align:left}
.starter:hover{transform:translateY(-2px);border-color:rgba(61,232,197,.45);box-shadow:var(--shadow-soft)}
.starter .mono{display:block;font-size:9px;margin-bottom:4px}

/* messages */
.msg{display:flex;gap:13px;align-items:flex-start}
.msg--user{flex-direction:row-reverse}
.av{width:34px;height:34px;border-radius:12px;flex:none;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}
.av--pal{background:#121C30}
.av--user{background:var(--card2);border:1px solid var(--line);color:var(--cream)}
.bubble{max-width:min(620px,86%);border-radius:6px 18px 18px 18px;border:1px solid var(--line);background:var(--card);padding:14px 18px;font-size:14.5px;position:relative;overflow-wrap:break-word}
.msg--user .bubble{border-radius:18px 6px 18px 18px;background:var(--card2)}
.bubble p{margin:0 0 8px}
.bubble p:last-child{margin-bottom:0}
.bubble ul{margin:4px 0 8px;padding-left:18px}
.bubble li{margin-bottom:4px}
.bubble strong{font-weight:700}
.bubble a{color:#0A9F7B;font-weight:600;border-bottom:1px solid rgba(61,232,197,.4)}
html.dark-mode .bubble a{color:var(--teal)}

/* typing */
.typing{display:inline-flex;gap:5px;padding:6px 2px}
.typing i{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:tp 1.1s ease-in-out infinite}
.typing i:nth-child(2){animation-delay:.18s}
.typing i:nth-child(3){animation-delay:.36s}
@keyframes tp{0%,100%{opacity:.25;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}

/* inline quiz */
.qz{margin-top:10px;border-top:1px dashed var(--line);padding-top:12px}
.qz__q{font-weight:600;margin-bottom:9px}
.qz__opts{display:grid;gap:7px}
.qz__opt{display:flex;align-items:center;gap:9px;border:1px solid var(--line);background:var(--card2);border-radius:11px;padding:9px 12px;font-size:13.5px;text-align:left;transition:border-color .2s var(--ease)}
.qz__opt:hover{border-color:var(--line-strong)}
.qz__opt .l{width:22px;height:22px;border-radius:7px;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:'Fragment Mono',monospace;font-size:10px;flex:none}
.qz__opt.ok{border-color:var(--teal);background:rgba(61,232,197,.12)}
.qz__opt.ok .l{background:var(--teal);color:var(--on-accent);border-color:transparent}
.qz__opt.no{border-color:var(--rose);background:rgba(255,122,162,.12)}
.qz__opt.no .l{background:var(--rose);color:var(--on-accent);border-color:transparent}
.qz__opt:disabled{cursor:default}
.qz__verdict{font-size:13px;font-weight:700;margin-top:9px;min-height:18px}

/* chips after reply */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;padding-left:47px}
.chip{font-size:12.5px;font-weight:600;border:1px solid var(--line);background:var(--card);border-radius:999px;padding:7px 14px;color:var(--muted);transition:all .25s var(--ease)}
.chip:hover{color:var(--cream);border-color:rgba(61,232,197,.5);transform:translateY(-1px)}

/* composer */
.composer{flex:none;border-top:1px solid var(--line);padding:14px 28px 18px;background:var(--ink)}
.composer__inner{max-width:780px;margin:0 auto}
.box{display:flex;align-items:flex-end;gap:10px;border:1.5px solid var(--line);background:var(--card);border-radius:18px;padding:10px 10px 10px 18px;transition:border-color .25s var(--ease),box-shadow .25s var(--ease)}
.box:focus-within{border-color:rgba(61,232,197,.55);box-shadow:0 0 0 4px rgba(61,232,197,.1)}
.box textarea{flex:1;background:none;border:none;outline:none;resize:none;font-family:inherit;font-size:14.5px;color:var(--cream);line-height:1.5;max-height:130px;padding:6px 0}
.box textarea::placeholder{color:var(--muted)}
.send{width:40px;height:40px;border-radius:13px;background:var(--aurora);color:var(--on-accent);display:flex;align-items:center;justify-content:center;flex:none;box-shadow:0 6px 20px rgba(61,232,197,.35);transition:transform .25s var(--ease)}
.send:hover{transform:translateY(-2px)}
.send:disabled{opacity:.4;transform:none;cursor:default}
.composer__note{text-align:center;font-size:11px;color:var(--muted);margin-top:9px}

.menu-btn{display:none;width:34px;height:34px;border:1px solid var(--line);border-radius:10px;align-items:center;justify-content:center;color:var(--cream)}

@media (max-width:1024px){.nav__links{display:none}}
@media (max-width:860px){
  .app{grid-template-columns:1fr}
  .side{position:fixed;inset:64px 0 0 0;z-index:70;background:var(--ink);display:none}
  .side.is-open{display:flex}
  .menu-btn{display:inline-flex}
  .thread{padding:20px 16px}
  .composer{padding:12px 16px 14px}
  .pane__head{padding:12px 16px}
  .pane__hint{display:none}
  .starters{grid-template-columns:1fr}
  .chips{padding-left:0}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;transition-duration:.01ms !important}
}

/* hand-written study notes for popular chapters */

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
/* markdown-lite: **bold**, "- " bullets, [label](url) links */
function md(s){
  var out = [], lines = String(s).split('\n'), inUl = false;
  lines.forEach(function(ln){
    var safe = esc(ln)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\[(.+?)\]\((learn\.html[^)]*)\)/g, '<a href="$2">$1</a>');
    if(/^- /.test(ln)){
      if(!inUl){ out.push('<ul>'); inUl = true; }
      out.push('<li>' + safe.slice(2) + '</li>');
    } else {
      if(inUl){ out.push('</ul>'); inUl = false; }
      if(ln.trim()) out.push('<p>' + safe + '</p>');
    }
  });
  if(inUl) out.push('</ul>');
  return out.join('');
}
function norm(s){ return s.toLowerCase().replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim(); }

function findChapter(text){
  var t = norm(text);
  if(!t) return null;
  var best = null, bestScore = 0;
  CURR.forEach(function(c){
    var name = norm(c.name);
    if(t.indexOf(name) !== -1){
      var s = name.length + 100;
      if(s > bestScore){ bestScore = s; best = c; }
      return;
    }
    var words = name.split(' ').filter(function(w){ return w.length > 3; });
    var hit = 0;
    words.forEach(function(w){ if(t.indexOf(w) !== -1) hit++; });
    if(words.length && hit >= Math.max(1, Math.ceil(words.length * 0.6))){
      var score = hit / words.length * name.length;
      if(score > bestScore){ bestScore = score; best = c; }
    }
  });
  return best;
}
function learnLink(c){
  return 'learn.html?class=' + c.cls + '&subject=' + c.subj;
}

var lastChapter = null;

function studentReply(text){
  var t = norm(text);
  var ch = findChapter(text) || (/\b(it|this|that|isko|iska|usse)\b/.test(t) ? lastChapter : null);
  if(ch) lastChapter = ch;

  var wantQuiz = /\b(quiz|mcq|test me|questions?|practice|puchho|pucho)\b/.test(t);
  var wantNotes = /\b(notes?|summar|revis|key points?|explain|samjha|kya hai|what is|batao|easy words)\b/.test(t);

  if(/^(hi|hello|hey|namaste|hii+|yo)\b/.test(t) && t.length < 18){
    return { text:'Namaste! I’m **PAL**, your study buddy.\nAsk me any chapter — like **"summarise Polynomials"**, **"explain Heat"** or **"quiz me on Motion"**.' };
  }
  if(/thank/.test(t)){
    return { text:'Anytime. One chapter a day beats ten before the exam — pick tomorrow’s now?' };
  }
  if(/\b(what should i study|kya padhu|study plan|today)\b/.test(t)){
    var state = readLS('edulearn_state');
    var line = 'Here’s a smart plan for today:\n- **20 min** — continue your most recent chapter\n- **10 min** — one practice set on your weakest topic\n- **2 min** — this hour’s Arena drop for streak points';
    if(state && state.chapters){
      var open = Object.keys(state.chapters).filter(function(k){ return !state.chapters[k].mastered; });
      if(open.length) line += '\n\nYou have **' + open.length + ' chapters in progress** — finishing beats starting.';
    }
    return { text: line, chips:['Quiz me on Polynomials','Summarise Motion','Explain the French Revolution'] };
  }

  if(wantQuiz){
    var subj = ch ? (QUIZ[ch.subj] ? ch.subj : 'maths')
      : (/math/.test(t) ? 'maths' : /science|physic|chem|bio/.test(t) ? 'science' : /history|civic|geo|social|democra|revolution/.test(t) ? 'social' : 'maths');
    var pool = QUIZ[subj] || QUIZ.maths;
    var q = pool[Math.floor(Math.random() * pool.length)];
    return {
      text:'Quick one' + (ch ? ' from **' + ch.name + '** territory' : '') + ' — 30 seconds, no peeking:',
      quiz: q,
      chips: ch ? ['Notes on ' + ch.name, 'Another quiz'] : ['Another quiz','Summarise Number Systems']
    };
  }

  if(ch){
    var key = norm(ch.name);
    var kb = KB[key] || KB[key.replace(/^the /,'')];
    var head = '**' + ch.name + '** — Class ' + ch.cls + ' ' + SUBJECTS[ch.subj].en;
    if(kb){
      var body = head + '\n' + kb.notes.map(function(n){ return '- ' + n; }).join('\n') +
        '\n\n' + kb.qa + '\n\n[Open the full lesson in Learn](' + learnLink(ch) + ')';
      return { text: body, chips:['Quiz me on ' + ch.name, 'Explain the hardest part', 'What should I study today?'] };
    }
    var generic = head +
      '\nHere’s how I’d attack this chapter:\n- **Watch** the animated lecture first — 1.25× speed is fine\n- **Write** every bold term and formula in your own words\n- **Practice** 10 questions; star the ones you guess on\n- **Re-test** yourself after a day, not the same evening' +
      '\n\n[Open it in Learn](' + learnLink(ch) + ') and ask me for a quiz when ready.';
    return { text: generic, chips:['Quiz me on ' + ch.name, 'What should I study today?'] };
  }

  if(wantNotes){
    return { text:'Tell me the chapter and I’ll do the rest — for example **"notes on Gravitation"** or **"summarise The Mughal Empire"**. I cover Classes 6–9, all five subjects.' };
  }
  return { text:'I’m built for your syllabus — try naming a chapter:\n- **"Summarise Polynomials"**\n- **"Explain Heat in easy words"**\n- **"Quiz me on the French Revolution"**\n\nOr ask **"what should I study today?"** and I’ll plan it.' };
}

}
function chipsHTML(chips){
  if(!chips || !chips.length) return '';
  return '<div class="chips">' + chips.map(function(c){
    return '<button class="chip" data-q="' + esc(c) + '" type="button">' + esc(c) + '</button>';
  }).join('') + '</div>';
}

function renderThread(){
  var c = activeChat();
  if(!c || !c.msgs.length){
    threadInner.innerHTML = welcomeHTML();
  } else {
    var html = '';
    c.msgs.forEach(function(m, i){
      html += msgHTML(m);
      if(m.who === 'pal' && m.chips && i === c.msgs.length - 1) html += chipsHTML(m.chips);
    });
    threadInner.innerHTML = html;
  }
  bindThread();
  thread.scrollTop = thread.scrollHeight;
}

function bindThread(){
  threadInner.querySelectorAll('[data-q]').forEach(function(b){
    b.addEventListener('click', function(){ sendMessage(b.getAttribute('data-q')); });
  });
  threadInner.querySelectorAll('.qz__opt:not([disabled])').forEach(function(b){
    b.addEventListener('click', function(){
      var c = activeChat(); if(!c) return;
      var m = null;
      c.msgs.forEach(function(x){ if(x.quiz && !x.quizDone) m = x; });
      if(!m) return;
      m.quizDone = { picked: parseInt(b.getAttribute('data-i'), 10) };
      save(); renderThread();
    });
  });
}

/* streaming reveal */
function streamIn(m, after){
  var holder = document.createElement('div');
  threadInner.appendChild(holder);
  var words = m.text.split(' ');
  var i = 0;
  function step(){
    i = Math.min(words.length, i + 1 + Math.floor(Math.random() * 2));
    var partial = words.slice(0, i).join(' ');
    holder.innerHTML = msgHTML({ who:'pal', text: partial, quiz: i >= words.length ? m.quiz : null, quizDone: null });
    thread.scrollTop = thread.scrollHeight;
    if(i < words.length){ setTimeout(step, 32); }
    else {
      if(m.chips) holder.insertAdjacentHTML('afterend', chipsHTML(m.chips));
      bindThread();
      thread.scrollTop = thread.scrollHeight;
      after();
    }
  }
  step();
}

function sendMessage(text){
  text = (text || '').trim();
  if(!text || busy) return;
  var c = activeChat();
  if(!c){ newChat(); c = activeChat(); }
  c.role = store.role;
  if(c.msgs.length === 0){
    c.title = text.length > 34 ? text.slice(0, 34) + '…' : text;
  }
  c.msgs.push({ who:'user', text: text });
  save(); renderChatList(); renderThread();
  input.value = ''; autosize();

  busy = true; sendBtn.disabled = true;
  threadInner.insertAdjacentHTML('beforeend',
    '<div class="msg msg--pal" id="typingRow"><span class="av av--pal">' + PAL_AV + '</span><div class="bubble"><span class="typing"><i></i><i></i><i></i></span></div></div>');
  thread.scrollTop = thread.scrollHeight;

  setTimeout(function(){
    var r = reply(text);
    var row = document.getElementById('typingRow');
    if(row) row.remove();
    var m = { who:'pal', text: r.text, quiz: r.quiz || null, quizDone: null, chips: r.chips || null };
    streamIn(m, function(){
      c.msgs.push(m);
      save();
      busy = false; sendBtn.disabled = false;
      input.focus();
    });
  }, 650 + Math.random() * 500);
}

/* ============================================================
   WIRING
   ============================================================ */
function autosize(){
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 130) + 'px';
}
input.addEventListener('input', autosize);
input.addEventListener('keydown', function(e){
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    sendMessage(input.value);
  }
});
sendBtn.addEventListener('click', function(){ sendMessage(input.value); });
document.getElementById('newChat').addEventListener('click', function(){
  newChat();
  document.getElementById('sidebar').classList.remove('is-open');
  input.focus();
});
document.querySelectorAll('.role').forEach(function(b){
  b.addEventListener('click', function(){ setRole(b.getAttribute('data-role')); });
});
document.getElementById('menuBtn').addEventListener('click', function(){
  document.getElementById('sidebar').classList.toggle('is-open');
});

/* boot */
if(!store.activeId || !activeChat()){
  if(store.chats.length){ store.activeId = store.chats[0].id; }
  else { store.chats.unshift({ id:'c' + Date.now(), role: store.role, title:'New chat', msgs:[] }); store.activeId = store.chats[0].id; }
}
setRole(store.role, true);
renderChatList();
renderThread();

})();
</script>
<script src="../theme.js"></script>
</body>
